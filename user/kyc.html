<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KYC Verification</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .card { width: 100%; max-width: 400px; background: rgba(255,255,255,0.05); padding: 30px; border-radius: 30px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .step { background: #1e293b; padding: 20px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #334155; }
        .btn { width: 100%; padding: 15px; background: #6366f1; color: white; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Verify Identity 🛡️</h2>
        <p style="color:#94a3b8">Bishi शुरू करने के लिए KYC जरूरी है।</p>
        
        <div class="step">
            <h4>Aadhar Card</h4>
            <input type="file" accept="image/*">
        </div>
        
        <div class="step">
            <h4>PAN Card</h4>
            <input type="file" accept="image/*">
        </div>

        <button class="btn" onclick="location.href='user-bank.html'">SAVE & NEXT</button>
    </div>
</body>
</html>
