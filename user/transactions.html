<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passbook | Indian Bishi</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; margin: 0; padding: 20px; }
        .header { font-size: 20px; font-weight: 800; margin-bottom: 20px; }
        .txn-card { background: white; padding: 15px; border-radius: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #e2e8f0; }
        .title { font-size: 14px; font-weight: 800; color: #1e293b; }
        .date { font-size: 11px; color: #64748b; font-weight: 600; margin-top: 4px; }
        .amt { font-size: 16px; font-weight: 800; }
        .cred { color: #10b981; } .deb { color: #ef4444; } .pend { color: #f59e0b; }
    </style>
</head>
<body>
    <div class="header">Passbook 📘</div>
    <div id="list"><p>Loading history...</p></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const app = initializeApp({ databaseURL: "https://indianbishi-pro-default-rtdb.firebaseio.com" });
        const db = getDatabase(app);
        const mobile = localStorage.getItem('activeUser');

        onValue(ref(db, 'transactions'), snap => {
            const list = document.getElementById('list');
            list.innerHTML = "";
            snap.forEach(c => {
                const d = c.val();
                if(d.userMobile === mobile) {
                    let colorCls = d.type === 'Credit' ? 'cred' : (d.type === 'Pending' ? 'pend' : 'deb');
                    let sign = d.type === 'Debit' ? '-' : '+';
                    list.innerHTML = `
                        <div class="txn-card">
                            <div><div class="title">${d.title}</div><div class="date">${d.date} • ${d.status || d.type}</div></div>
                            <div class="amt ${colorCls}">${sign}₹${d.amount}</div>
                        </div>` + list.innerHTML;
                }
            });
        });
    </script>
</body>
</html>
