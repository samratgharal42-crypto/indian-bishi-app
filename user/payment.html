<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Add Money | Indian Bishi</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }
        input { width: 100%; padding: 20px; border-radius: 16px; border: 2px solid #e2e8f0; font-size: 32px; font-weight: 800; text-align: center; margin: 20px 0; color: var(--primary); outline: none; }
        .pay-btn { width: 100%; background: #673ab7; color: white; border: none; padding: 18px; border-radius: 16px; font-weight: 800; font-size: 16px; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; }
        .phonepe-logo { height: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="font-size: 18px;">Add Money to Wallet</h2>
        <p style="font-size: 12px; color: #64748b; margin-top: 5px;">Enter amount to deposit via PhonePe</p>
        <input type="number" id="amt" placeholder="₹0">
        <button class="pay-btn" onclick="alert('PhonePe Integration is coming soon!')">
            Proceed to Pay <img src="https://upload.wikimedia.org/wikipedia/commons/7/71/PhonePe_Logo.png" class="phonepe-logo">
        </button>
    </div>
</body>
</html>
