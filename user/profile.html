<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Account Settings | Indian Bishi</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --text: #1e293b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; color: var(--text); padding: 20px; padding-bottom: 100px; }

        h2 { font-weight: 800; font-size: 22px; margin-bottom: 25px; margin-top: 10px; }

        .menu-list { display: flex; flex-direction: column; gap: 15px; }
        
        .menu-item { background: white; padding: 20px; border-radius: 18px; display: flex; justify-content: space-between; align-items: center; font-weight: 700; font-size: 15px; text-decoration: none; color: var(--text); box-shadow: 0 4px 15px rgba(0,0,0,0.02); border: 1px solid #f1f5f9; cursor: pointer; }
        .arrow { color: #cbd5e1; font-weight: 800; }
        
        .logout-btn { color: #ef4444; margin-top: 10px; font-weight: 800;}

        /* PROFESSIONAL LOGOUT POPUP */
        .popup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 10000; padding: 20px; }
        .popup-content { background: white; width: 100%; max-width: 320px; padding: 35px 25px; border-radius: 32px; text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.2); animation: pop 0.3s ease-out; }
        @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .popup-btn { width: 100%; padding: 16px; border-radius: 16px; border: none; font-weight: 800; font-size: 15px; cursor: pointer; margin-top: 10px; }
        .confirm-btn { background: #ef4444; color: white; box-shadow: 0 10px 20px rgba(239, 68, 68, 0.2); }
        .cancel-btn { background: #f1f5f9; color: #64748b; }

        /* Bottom Navigation */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; height: 80px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 -10px 40px rgba(0,0,0,0.05); z-index: 999; border-top: 1px solid #f1f5f9; }
        .nav-item { text-decoration: none; color: #94a3b8; font-size: 10px; font-weight: 800; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>

    <h2>Account Settings ⚙️</h2>

    <div class="menu-list">
        <a href="/indian-bishi-app/kyc.html" class="menu-item">
            <span>🛡️ Identity Verification (KYC)</span>
            <span class="arrow">></span>
        </a>

        <a href="/indian-bishi-app/user/user-bank.html" class="menu-item">
            <span>🏦 Bank & UPI Details</span>
            <span class="arrow">></span>
        </a>

        <a href="/indian-bishi-app/support.html" class="menu-item">
            <span>🎧 Help & Live Support</span>
            <span class="arrow">></span>
        </a>

        <div onclick="showLogoutPopup()" class="menu-item logout-btn">
            <span>🚪 Secure Logout</span>
            <span class="arrow">></span>
        </div>
    </div>

    <div id="logout-popup" class="popup-overlay">
        <div class="popup-content">
            <div style="font-size: 50px; margin-bottom: 10px;">🚪</div>
            <h3 style="margin:0 0 10px; font-size:20px; color: #1e293b;">Confirm Logout</h3>
            <p style="font-size:14px; color:#64748b; line-height:1.5; margin:0;">Are you sure you want to securely logout from Indian Bishi?</p>
            <button class="popup-btn confirm-btn" onclick="logoutUser()">Yes, Logout</button>
            <button class="popup-btn cancel-btn" onclick="closePopup()">Cancel</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="/indian-bishi-app/dashboard.html" class="nav-item">🏠<span>HOME</span></a>
        <a href="/indian-bishi-app/bishi/all-pools.html" class="nav-item">🎯<span>MY BISHI</span></a>
        <a href="/indian-bishi-app/user/profile.html" class="nav-item active">👤<span>ACCOUNT</span></a>
    </nav>

    <script>
        // Check if user is logged in
        if(!localStorage.getItem('activeUser')) {
            window.location.href = "/indian-bishi-app/index.html";
        }

        // Logout Popup Functions
        function showLogoutPopup() {
            document.getElementById('logout-popup').style.display = 'flex';
        }
        function closePopup() {
            document.getElementById('logout-popup').style.display = 'none';
        }

        // Actual Logout Function
        function logoutUser() {
            localStorage.removeItem('activeUser'); // Remove session
            // Path standardized properly
            window.location.href = "/indian-bishi-app/index.html"; // Redirect to login
        }
    </script>
</body>
</html>
