<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Profile | Indian Bishi</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --text: #1e293b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; color: var(--text); padding-bottom: 90px; }

        /* Advanced Profile Card */
        .profile-header { background: linear-gradient(135deg, #6366f1, #a855f7); padding: 40px 20px 30px; text-align: center; color: white; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; box-shadow: 0 10px 30px rgba(99, 102, 241, 0.2); }
        .avatar { width: 80px; height: 80px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 35px; margin: 0 auto 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .user-name { font-size: 22px; font-weight: 800; margin: 0; }
        .user-mobile { font-size: 13px; opacity: 0.8; margin-top: 5px; }

        /* Wallet Card */
        .wallet-card { background: white; margin: -20px 20px 20px; padding: 20px; border-radius: 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05); position: relative; z-index: 10; border: 1px solid #f1f5f9; }
        .wallet-label { font-size: 11px; color: #64748b; font-weight: 800; text-transform: uppercase; }
        .wallet-balance { font-size: 28px; font-weight: 800; color: var(--primary); margin: 5px 0 0; }

        .menu-list { padding: 0 20px; display: flex; flex-direction: column; gap: 12px; }
        .menu-item { background: white; padding: 18px 20px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; font-weight: 700; font-size: 14px; text-decoration: none; color: var(--text); box-shadow: 0 4px 15px rgba(0,0,0,0.02); border: 1px solid #f1f5f9; }
        .arrow { color: #cbd5e1; font-weight: 800; }
        .logout-btn { color: #ef4444; margin-top: 10px; cursor: pointer; }

        /* Bottom Navigation */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; height: 75px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 -10px 30px rgba(0,0,0,0.05); border-top: 1px solid #f1f5f9; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 5px; text-decoration: none; color: #94a3b8; font-size: 10px; font-weight: 700; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 22px; }
    </style>
</head>
<body>

    <div class="profile-header">
        <div class="avatar">👤</div>
        <h2 class="user-name" id="display-name">Loading...</h2>
        <p class="user-mobile" id="display-mobile">+91 ----------</p>
    </div>

    <div class="wallet-card">
        <div class="wallet-label">Total Wallet Balance</div>
        <div class="wallet-balance" id="display-balance">₹0.00</div>
    </div>

    <div class="menu-list">
        <a href="/indian-bishi-app/kyc.html" class="menu-item">
            <span>🛡️ Identity Verification (KYC)</span>
            <span class="arrow">></span>
        </a>
        <a href="/indian-bishi-app/user/user-bank.html" class="menu-item">
            <span>🏦 Bank & UPI Details</span>
            <span class="arrow">></span>
        </a>
        <a href="#" class="menu-item">
            <span>🎧 Help & Support</span>
            <span class="arrow">></span>
        </a>
        <div onclick="logoutUser()" class="menu-item logout-btn">
            <span>🚪 Secure Logout</span>
            <span class="arrow">></span>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="/indian-bishi-app/dashboard.html" class="nav-item">
            <span class="nav-icon">🏠</span><span>HOME</span>
        </a>
        <a href="/indian-bishi-app/bishi/all-pools.html" class="nav-item">
            <span class="nav-icon">🎯</span><span>MY BISHI</span>
        </a>
        <a href="/indian-bishi-app/user/profile.html" class="nav-item active">
            <span class="nav-icon">👤</span><span>ACCOUNT</span>
        </a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const app = initializeApp({ databaseURL: "https://indianbishi-pro-default-rtdb.firebaseio.com" });
        const db = getDatabase(app);

        const userMobile = localStorage.getItem('activeUser');
        if(!userMobile) {
            window.location.href = "/indian-bishi-app/index.html";
        } else {
            document.getElementById('display-mobile').innerText = "+91 " + userMobile;
            
            get(child(ref(db), `users/${userMobile}`)).then((snapshot) => {
                if (snapshot.exists()) {
                    document.getElementById('display-name').innerText = snapshot.val().name;
                    document.getElementById('display-balance').innerText = "₹" + (snapshot.val().balance || 0).toFixed(2);
                }
            });
        }

        window.logoutUser = () => {
            if(confirm("Are you sure you want to logout?")) {
                localStorage.removeItem('activeUser');
                window.location.href = "/indian-bishi-app/index.html";
            }
        }
    </script>
</body>
</html>
