<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KYC Verification | Indian Bishi</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; margin: 0; padding: 20px; color: #1e293b; }
        
        .header-bar { display: flex; align-items: center; margin-bottom: 20px; }
        .back-btn { text-decoration: none; color: #1e293b; font-size: 24px; font-weight: 800; margin-right: 15px; }
        h2 { font-size: 22px; margin: 0; font-weight: 800; }

        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); border: 1px solid #f1f5f9; }
        
        .upload-box { border: 2px dashed #cbd5e1; padding: 20px; text-align: center; border-radius: 15px; margin-bottom: 20px; background: #f8fafc; position: relative; }
        .upload-box h4 { margin: 0 0 10px; color: #475569; font-size: 14px; }
        input[type="file"] { width: 100%; font-size: 12px; color: #64748b; }
        
        .btn { width: 100%; padding: 18px; background: #6366f1; color: white; border: none; border-radius: 15px; font-weight: 800; font-size: 15px; cursor: pointer; margin-top: 10px; box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2); }
        .btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="header-bar">
        <a href="/indian-bishi-app/user/profile.html" class="back-btn">←</a>
        <h2>Identity (KYC) 🛡️</h2>
    </div>

    <div class="card">
        <p style="font-size: 13px; color: #64748b; margin-top: 0; margin-bottom: 20px;">
            Securely verify your identity to activate your Bishi withdrawals.
        </p>
        
        <div class="upload-box">
            <h4>Aadhar Card (Front)</h4>
            <input type="file" accept="image/*">
        </div>
        
        <div class="upload-box">
            <h4>PAN Card</h4>
            <input type="file" accept="image/*">
        </div>

        <button class="btn" onclick="submitKYC()">SUBMIT DOCUMENTS</button>
    </div>

    <script>
        function submitKYC() {
            // Here we will later add Firebase Storage logic
            alert('KYC Documents Submitted Successfully! Pending Approval.');
            window.location.href = "/indian-bishi-app/user/profile.html";
        }
    </script>

</body>
</html>
