<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Indian Bishi | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --text: #1e293b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; color: var(--text); padding-bottom: 90px; }

        /* Header with Trust Badge */
        .header { background: linear-gradient(135deg, #6366f1, #a855f7); padding: 30px 20px 50px; border-bottom-left-radius: 35px; border-bottom-right-radius: 35px; color: white; position: relative; }
        .user-greet { font-size: 13px; opacity: 0.9; }
        .user-name { font-size: 24px; font-weight: 800; margin-top: 5px; }
        .trust-badge { position: absolute; top: 30px; right: 20px; background: rgba(255,255,255,0.2); padding: 5px 12px; border-radius: 10px; font-size: 11px; font-weight: 800; backdrop-filter: blur(5px); }

        /* Stats Wallet */
        .stats-container { display: flex; gap: 15px; margin: -30px 20px 25px; }
        .stat-box { flex: 1; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; border: 1px solid #f1f5f9; }
        .stat-val { display: block; font-size: 22px; font-weight: 800; color: var(--primary); }
        .stat-lbl { font-size: 10px; color: #94a3b8; font-weight: 800; text-transform: uppercase; margin-top: 5px; }

        /* Bishi Lobby */
        .section-title { padding: 0 20px; font-weight: 800; font-size: 18px; margin-bottom: 15px; }
        .pool-card { background: white; border-radius: 20px; padding: 20px; margin: 0 20px 15px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 15px rgba(0,0,0,0.02); border: 1px solid #f1f5f9; }
        .pool-info { flex: 1; }
        .pool-name { font-weight: 800; font-size: 15px; margin-bottom: 4px; color: #1e293b; }
        .pool-meta { font-size: 12px; color: #64748b; font-weight: 600; }
        .view-btn { padding: 10px 18px; background: #eef2ff; color: var(--primary); border-radius: 12px; font-weight: 800; font-size: 12px; text-decoration: none; border: 1px solid #e0e7ff; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; height: 75px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 -10px 30px rgba(0,0,0,0.05); border-top: 1px solid #f1f5f9; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 5px; text-decoration: none; color: #94a3b8; font-size: 10px; font-weight: 800; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 22px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="trust-badge">🛡️ Score: <span id="cibil-display">Pending</span></div>
        <div class="user-greet">Namaste, Welcome Back!</div>
        <div class="user-name" id="user-display">Loading...</div>
    </div>

    <div class="stats-container">
        <div class="stat-box">
            <span class="stat-val" id="bal-display">₹0.00</span>
            <span class="stat-lbl">Wallet</span>
        </div>
        <div class="stat-box">
            <span class="stat-val">0</span>
            <span class="stat-lbl">Active Bishi</span>
        </div>
    </div>

    <div class="section-title">
        Lobby (Available Bishi) 🏛️
    </div>

    <div class="pool-card">
        <div class="pool-info">
            <div class="pool-name">Micro Daily Pool 💰</div>
            <div class="pool-meta">₹50 / day • 60 Days</div>
        </div>
        <a href="bishi/pool-info.html" class="view-btn">ENTER</a>
    </div>

    <div class="pool-card">
        <div class="pool-info">
            <div class="pool-name">Starter Weekly 💎</div>
            <div class="pool-meta">₹500 / week • 10 Weeks</div>
        </div>
        <a href="bishi/pool-info.html" class="view-btn">ENTER</a>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item active">
            <span class="nav-icon">🏠</span><span>HOME</span>
        </a>
        <a href="bishi/all-pools.html" class="nav-item">
            <span class="nav-icon">🎯</span><span>MY BISHI</span>
        </a>
        <a href="user/profile.html" class="nav-item">
            <span class="nav-icon">👤</span><span>ACCOUNT</span>
        </a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const app = initializeApp({ databaseURL: "https://indianbishi-pro-default-rtdb.firebaseio.com" });
        const db = getDatabase(app);
        const mobile = localStorage.getItem('activeUser');

        if(!mobile) { 
            window.location.href = "index.html"; 
        } else {
            get(child(ref(db), `users/${mobile}`)).then((snap) => {
                if(snap.exists()){
                    const data = snap.val();
                    document.getElementById('user-display').innerText = data.name;
                    document.getElementById('bal-display').innerText = "₹" + (data.balance || 0).toFixed(2);
                    
                    // Future Logic: If admin assigns CIBIL, it will show here automatically
                    if(data.cibil) {
                        document.getElementById('cibil-display').innerText = data.cibil;
                    }
                }
            });
        }
    </script>
</body>
</html>
