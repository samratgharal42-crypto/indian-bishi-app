<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Indian Bishi</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        /* TUZHA JUNA CSS ITHE THEV (Copy from previous dashboard) */
        :root { --primary: #6366f1; --bg: #f8fafc; --text: #1e293b; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 100px; }
        /* Add basic styles for the cards here */
        .header { background: linear-gradient(135deg, #6366f1, #a855f7); padding: 30px 20px 60px; color: white; border-radius: 0 0 30px 30px; position: relative; }
        .cibil-badge { background: rgba(255,255,255,0.2); padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 800; position: absolute; right: 20px; top: 35px; border: 1px solid rgba(255,255,255,0.3); cursor: pointer; }
        .pool-card-new { background: white; border-radius: 20px; padding: 20px; margin: 15px 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); border: 1px solid #f1f5f9; }
        .btn-gradient { background: linear-gradient(135deg, #6366f1, #a855f7); color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-size: 16px; font-weight: 800; cursor: pointer; display: block; text-align: center; }
        .btn-locked { background: #e2e8f0; color: #94a3b8; border: none; width: 100%; padding: 15px; border-radius: 12px; font-size: 14px; font-weight: 800; text-align: center; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-size: 14px; opacity: 0.9;">Welcome back,</div>
        <div style="font-size: 28px; font-weight: 800;" id="user-name">Loading...</div>
        <div class="cibil-badge" id="cibil-display" onclick="window.location.href='user/cibil.html'">Check CIBIL</div>
    </div>

    <div id="investment-pools"></div>

    <script type="module">
        // --- URL HIDER SCRIPT ---
        if (window.history.replaceState) {
            // Hides .html from the URL bar to look professional
            window.history.replaceState(null, null, window.location.href.replace('.html', ''));
        }

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, get, child, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const app = initializeApp({ databaseURL: "https://indianbishi-pro-default-rtdb.firebaseio.com" });
        const db = getDatabase(app);
        const mobile = localStorage.getItem('activeUser');
        if(!mobile) window.location.href = "index.html";

        let userCibil = 0;

        get(child(ref(db), `users/${mobile}`)).then((snap) => {
            if(snap.exists()) {
                const u = snap.val();
                document.getElementById('user-name').innerText = u.name || "User";
                if(u.cibil) {
                    userCibil = parseInt(u.cibil);
                    document.getElementById('cibil-display').innerText = `🛡️ CIBIL: ${userCibil}`;
                } else {
                    document.getElementById('cibil-display').innerText = `⚠️ Check CIBIL Now`;
                }
            }
        });

        onValue(ref(db, 'pools'), (snapshot) => {
            const container = document.getElementById('investment-pools');
            container.innerHTML = "";
            snapshot.forEach((childSnapshot) => {
                const pId = childSnapshot.key;
                const d = childSnapshot.val();
                const reqCibil = d.minCibil || 0; // Default 0 if not set by admin
                
                let btnHTML = "";
                // SMART CIBIL LOGIC
                if(userCibil === 0) {
                    btnHTML = `<button class="btn-locked" onclick="window.location.href='user/cibil.html'">Check CIBIL to Unlock 🔒</button>`;
                } else if(userCibil < reqCibil) {
                    btnHTML = `<div class="btn-locked" style="color:#ef4444;">Requires ${reqCibil} CIBIL Score 🔒</div>`;
                } else {
                    btnHTML = `<button class="btn-gradient" onclick="window.location.href='pool-details.html?id=${pId}'">View Details & Join 🚀</button>`;
                }

                container.innerHTML += `
                    <div class="pool-card-new">
                        <div style="font-weight:800; font-size:18px;">${d.name} <span style="font-size:10px; background:#e2e8f0; padding:3px 6px; border-radius:5px; float:right;">Min CIBIL: ${reqCibil}</span></div>
                        <div style="font-size:32px; font-weight:800; color:#10b981;">₹${d.winAmount}</div>
                        ${btnHTML}
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
