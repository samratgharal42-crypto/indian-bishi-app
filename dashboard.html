<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Indian Bishi | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --text: #1e293b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            min-height: 100vh;
            padding-bottom: 100px; /* Space for Bottom Nav */
        }

        /* HEADER SECTION */
        .header { 
            background: linear-gradient(135deg, #6366f1, #a855f7); 
            padding: 40px 20px 80px; 
            border-radius: 0 0 40px 40px; 
            color: white; 
            position: relative; 
        }
        .user-greet { font-size: 13px; opacity: 0.9; }
        .user-name { font-size: 26px; font-weight: 800; margin-top: 5px; }
        
        .trust-badge { 
            position: absolute; top: 35px; right: 20px; 
            background: rgba(255,255,255,0.2); padding: 8px 15px; 
            border-radius: 14px; font-size: 11px; font-weight: 800; 
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.3); 
        }

        /* STATS BOXES */
        .stats-container { 
            display: flex; gap: 15px; margin: -45px 20px 30px; 
            position: relative; z-index: 10; 
        }
        .stat-box { 
            flex: 1; background: white; padding: 25px 15px; 
            border-radius: 24px; box-shadow: 0 12px 30px rgba(0,0,0,0.08); 
            text-align: center; border: 1px solid #f1f5f9; 
        }
        .stat-val { display: block; font-size: 22px; font-weight: 800; color: var(--primary); }
        .stat-lbl { font-size: 10px; color: #94a3b8; font-weight: 800; text-transform: uppercase; margin-top: 6px; letter-spacing: 0.5px; }

        /* LOBBY AREA */
        .lobby-content { padding: 0 20px; }
        .section-title { font-weight: 800; font-size: 19px; margin-bottom: 20px; color: #1e293b; }
        
        .pool-card { 
            background: white; border-radius: 24px; padding: 20px; 
            margin-bottom: 15px; display: flex; align-items: center; 
            justify-content: space-between; box-shadow: 0 4px 20px rgba(0,0,0,0.02); 
            border: 1px solid #f1f5f9; 
        }
        .pool-info { flex: 1; }
        .pool-name { font-weight: 800; font-size: 16px; color: #1e293b; margin-bottom: 4px; }
        .pool-meta { font-size: 12px; color: #64748b; font-weight: 600; }
        
        .join-btn { 
            padding: 12px 26px; background: #6366f1; color: white; 
            border-radius: 14px; font-weight: 800; font-size: 13px; 
            border: none; cursor: pointer; box-shadow: 0 8px 15px rgba(99, 102, 241, 0.2);
        }

        /* BOTTOM NAVIGATION - FULLY FIXED */
        .bottom-nav { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: white; height: 85px; display: flex; 
            justify-content: space-around; align-items: center; 
            box-shadow: 0 -10px 40px rgba(0,0,0,0.08); 
            border-top: 1px solid #f1f5f9; z-index: 9999; 
            padding-bottom: 10px;
        }
        .nav-item { 
            display: flex; flex-direction: column; align-items: center; 
            gap: 6px; text-decoration: none; color: #94a3b8; 
            font-size: 10px; font-weight: 800; flex: 1;
        }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 24px; }

        /* POPUP SYSTEM */
        .popup-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
            display: none; align-items: center; justify-content: center; z-index: 10000; padding: 20px;
        }
        .popup-content {
            background: white; width: 100%; max-width: 350px; padding: 35px 25px;
            border-radius: 32px; text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.2);
        }
        .popup-btn { 
            width: 100%; padding: 18px; border-radius: 16px; 
            border: none; font-weight: 800; font-size: 15px; cursor: pointer; margin-bottom: 10px;
        }
        .btn-main { background: #6366f1; color: white; }
        .btn-sec { background: #f1f5f9; color: #64748b; }
    </style>
</head>
<body>

    <div class="header">
        <div class="trust-badge">🛡️ Score: <span id="cibil-display">Pending</span></div>
        <div class="user-greet">Welcome back,</div>
        <div class="user-name" id="user-display">Loading...</div>
    </div>

    <div class="stats-container">
        <div class="stat-box">
            <span class="stat-val" id="bal-display">₹0.00</span>
            <span class="stat-lbl">Wallet</span>
        </div>
        <div class="stat-box">
            <span class="stat-val">0</span>
            <span class="stat-lbl">My Pools</span>
        </div>
    </div>

    <div class="lobby-content">
        <div class="section-title">Investment Lobby 🏛️</div>

        <div class="pool-card">
            <div class="pool-info">
                <div class="pool-name">Micro Daily Pool</div>
                <div class="pool-meta">₹50 / Day • 60 Days</div>
            </div>
            <button class="join-btn" onclick="checkKYC()">JOIN</button>
        </div>
    </div>

    <div id="kyc-popup" class="popup-overlay">
        <div class="popup-content">
            <div style="font-size: 50px; margin-bottom: 15px;">🛡️</div>
            <h3 style="margin:0 0 10px; font-size:22px;">Verification Required</h3>
            <p style="font-size:14px; color:#64748b; line-height:1.5; margin-bottom:25px;">Please verify your Aadhaar & PAN to calculate your CIBIL Trust Score before investing.</p>
            <button class="popup-btn btn-main" onclick="location.href='kyc.html'">Verify Identity</button>
            <button class="popup-btn btn-sec" onclick="closePopup()">Maybe Later</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item active">
            <span class="nav-icon">🏠</span><span>HOME</span>
        </a>
        <a href="bishi/all-pools.html" class="nav-item">
            <span class="nav-icon">🎯</span><span>MY BISHI</span>
        </a>
        <a href="user/profile.html" class="nav-item">
            <span class="nav-icon">👤</span><span>ACCOUNT</span>
        </a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const app = initializeApp({ databaseURL: "https://indianbishi-pro-default-rtdb.firebaseio.com" });
        const db = getDatabase(app);
        const mobile = localStorage.getItem('activeUser');
        let hasCibil = false;

        if(mobile) {
            get(child(ref(db), `users/${mobile}`)).then((snap) => {
                if(snap.exists()){
                    const data = snap.val();
                    document.getElementById('user-display').innerText = data.name;
                    // SHOW RUPEE BALANCE
                    document.getElementById('bal-display').innerText = "₹" + (data.balance || 0).toFixed(2);
                    if(data.cibil) {
                        document.getElementById('cibil-display').innerText = data.cibil;
                        hasCibil = true;
                    }
                }
            });
        }

        window.checkKYC = () => {
            if(!hasCibil) document.getElementById('kyc-popup').style.display = 'flex';
            else location.href = 'bishi/pool-info.html';
        }
        window.closePopup = () => {
            document.getElementById('kyc-popup').style.display = 'none';
        }
    </script>
</body>
</html>
