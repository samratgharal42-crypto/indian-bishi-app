<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Indian Bishi</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f4f7fe; margin: 0; padding: 20px; padding-bottom: 80px; }
        .banner { width: 100%; height: 160px; background: linear-gradient(135deg, #6366f1, #a855f7); border-radius: 24px; color: white; padding: 20px; box-sizing: border-box; margin-bottom: 25px; }
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 15px; border-radius: 20px 20px 0 0; box-shadow: 0 -10px 30px rgba(0,0,0,0.05); }
        .nav-item { text-align: center; font-size: 11px; font-weight: 700; color: #a3aed1; cursor: pointer; }
        .nav-active { color: #6366f1; }
        .pool-card { background: white; padding: 20px; border-radius: 20px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
    <div class="banner">
        <h2>Special Bishi Pool! 🏛️</h2>
        <p>Invest ₹1000/week & Get ₹50,000</p>
    </div>

    <h3>Available Pools</h3>
    <div class="pool-card" onclick="location.href='bishi/info.html'">
        <div><b>Starter Pool</b><br><small>₹500 / Monthly</small></div>
        <button style="background:#6366f1; color:white; border:none; padding:8px 15px; border-radius:10px;">View</button>
    </div>

    <nav class="nav-bar">
        <div class="nav-item nav-active">🏠<br>HOME</div>
        <div class="nav-item" onclick="location.href='bishi/all-pools.html'">🎯<br>BISHI</div>
        <div class="nav-item" onclick="location.href='user/profile.html'">👤<br>ACCOUNT</div>
    </nav>
</body>
</html>
