<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>User Dashboard</title>
    <link href='https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap' rel='stylesheet'>
    <style>
        :root { --primary: #4318ff; --bg: #f4f7fe; --text: #2b3674; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; padding: 20px; padding-bottom: 100px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .wallet { background: linear-gradient(135deg, #4318ff, #7e57ff); padding: 25px; border-radius: 28px; color: white; margin-bottom: 30px; box-shadow: 0 20px 40px rgba(67, 24, 255, 0.1); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { padding: 22px; border-radius: 24px; color: white; text-align: center; }
        .red { background: #FF5B5B; } .blue { background: #4318FF; } .green { background: #05CD99; } .yellow { background: #FFBD59; }
        .nav { position: fixed; bottom: 20px; left: 20px; right: 20px; background: white; padding: 18px; display: flex; justify-content: space-around; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
    </style>
</head>
<body>
    <div class='header'>
        <div><h2 style='margin:0'>Jai Hind, Ritesh!</h2><p style='margin:0; color:#a3aed1; font-size:13px;'>Verified Member</p></div>
    </div>
    <div class='wallet'><small>Total Balance</small><h3 style='font-size:32px; margin:10px 0;'>₹45,000</h3></div>
    <div class='grid'>
        <div class='card red'><h4>₹5,000</h4><p>15 Days</p></div>
        <div class='card blue'><h4>₹25,000</h4><p>Monthly</p></div>
        <div class='card green'><h4>₹1,000</h4><p>Weekly</p></div>
        <div class='card yellow'><h4>₹1 Lakh</h4><p>Yearly</p></div>
    </div>
    <div class='nav'><span onclick='location.href="../index.html"'>🏠</span><span onclick='location.href="kyc.html"'>🛡️</span><span>💳</span></div>
</body>
</html>
