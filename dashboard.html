<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Indian Bishi | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --text: #1e293b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; color: var(--text); padding-bottom: 100px; overflow-x: hidden; }

        /* HEADER */
        .header { background: linear-gradient(135deg, #6366f1, #a855f7); padding: 40px 20px 80px; border-radius: 0 0 35px 35px; color: white; position: relative; }
        .user-greet { font-size: 13px; opacity: 0.9; margin-bottom: 2px;}
        .user-name { font-size: 24px; font-weight: 800; }
        .trust-badge { position: absolute; top: 35px; right: 20px; background: rgba(255,255,255,0.2); padding: 8px 14px; border-radius: 12px; font-size: 11px; font-weight: 800; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.3); }

        /* SLIDING BANNER */
        .banner-slider { margin: -40px 20px 20px; overflow: hidden; border-radius: 18px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); background: white; height: 100px; position: relative; z-index: 10; }
        .slides { display: flex; width: 300%; height: 100%; animation: slide 12s infinite; }
        .slide { width: 33.333%; height: 100%; display: flex; align-items: center; justify-content: center; box-sizing: border-box; }
        @keyframes slide { 0%, 25% { margin-left: 0; } 33%, 58% { margin-left: -100%; } 66%, 91% { margin-left: -200%; } 100% { margin-left: 0; } }

        /* POOLS SECTION */
        .lobby-content { padding: 0 20px; }
        .section-title { font-weight: 800; font-size: 18px; margin-bottom: 12px; }
        .pool-card { background: white; border-radius: 18px; padding: 18px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; border: 1px solid #f1f5f9; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .join-btn { padding: 10px 20px; background: var(--primary); color: white; border-radius: 12px; font-weight: 800; font-size: 13px; border: none; cursor: pointer; box-shadow: 0 5px 15px rgba(99, 102, 241, 0.2); }

        /* KYC POPUP */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 10000; padding: 20px; }
        .popup { background: white; width: 100%; max-width: 320px; padding: 25px; border-radius: 28px; text-align: center; }
        .p-btn { width: 100%; padding: 15px; border-radius: 14px; border: none; font-weight: 800; font-size: 14px; margin-bottom: 10px; cursor: pointer; }
        .btn-main { background: var(--primary); color: white; }

        /* ULTIMATE BOTTOM NAV FIX */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; height: 80px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 -10px 30px rgba(0,0,0,0.05); z-index: 9999; border-top: 1px solid #f1f5f9; }
        .nav-item { text-decoration: none; color: #94a3b8; font-size: 10px; font-weight: 800; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 33.33%; height: 100%; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 24px !important; display: flex; align-items: center; justify-content: center; height: 28px; margin-bottom: 4px; }
        
        /* SPECIAL CLASS FOR TARGET EMOJI TO MATCH SIZE */
        .bishi-target { font-size: 28px !important; }
    </style>
</head>
<body>

    <div class="header">
        <div class="trust-badge">🛡️ CIBIL: <span id="cibil-display">--</span></div>
        <div class="user-greet">Welcome back,</div>
        <div class="user-name" id="user-display">Loading...</div>
    </div>

    <div class="banner-slider">
        <div class="slides">
            <div class="slide" style="padding: 0;">
                <img src="offer1.jpg" style="width: 100%; height: 100%; object-fit: cover; border-radius: 18px;">
            </div>
            <div class="slide" style="padding: 0;">
                <img src="offer2.jpg" style="width: 100%; height: 100%; object-fit: cover; border-radius: 18px;">
            </div>
            <div class="slide" style="padding: 0;">
                <img src="offer3.jpg" style="width: 100%; height: 100%; object-fit: cover; border-radius: 18px;">
            </div>
        </div>
    </div>

    <div class="lobby-content">
        <div class="section-title">Investment Pools 🏛️</div>
        <div id="pool-list">
            <p style='text-align:center; color:#64748b; margin-top:20px; font-size:14px;'>Loading pools...</p>
        </div>
    </div>

    <div id="kyc-popup" class="overlay">
        <div class="popup">
            <div style="font-size:45px; margin-bottom: 10px;">🛡️</div>
            <h3 style="margin:0 0 10px; font-size:20px;">Verification Needed</h3>
            <p style="color:#64748b; font-size:13px; margin-bottom:20px; line-height:1.5;">Complete your KYC to unlock investment pools.</p>
            <button class="p-btn btn-main" onclick="location.href='kyc.html'">Verify Now</button>
            <button class="p-btn" style="background:#f1f5f9; color: #64748b;" onclick="document.getElementById('kyc-popup').style.display='none'">Maybe Later</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item active"><span class="nav-icon">🏠</span><span>HOME</span></a>
        <a href="bishi/all-pools.html" class="nav-item"><span class="nav-icon bishi-target">🎯</span><span>MY BISHI</span></a>
        <a href="user/profile.html" class="nav-item"><span class="nav-icon">👤</span><span>ACCOUNT</span></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const app = initializeApp({ databaseURL: "https://indianbishi-pro-default-rtdb.firebaseio.com" });
        const db = getDatabase(app);
        const mobile = localStorage.getItem('activeUser');

        const pools = [
            { name: "Micro Daily Pool", amt: 50, limit: 600, duration: "60 Days" },
            { name: "Starter Weekly", amt: 500, limit: 600, duration: "10 Weeks" },
            { name: "Silver Pool", amt: 2000, limit: 700, duration: "20 Weeks" },
            { name: "Gold Premium", amt: 5000, limit: 700, duration: "12 Months" }
        ];

        if(!mobile) {
            window.location.href = "index.html";
        } else {
            get(child(ref(db), `users/${mobile}`)).then((snap) => {
                if(snap.exists()){
                    const user = snap.val();
                    document.getElementById('user-display').innerText = user.name;
                    
                    const cibil = user.cibil || 0;
                    document.getElementById('cibil-display').innerText = cibil || "Pending";

                    const list = document.getElementById('pool-list');
                    list.innerHTML = ""; 

                    if(cibil < 600) {
                        list.innerHTML = `
                            <div style="background: white; padding: 20px; border-radius: 18px; text-align: center; border: 1px solid #f1f5f9;">
                                <div style="font-size:30px; margin-bottom:10px;">🔒</div>
                                <b>Pools Locked</b><br>
                                <span style="font-size:12px; color:#64748b;">Verify your identity to unlock pools.</span><br><br>
                                <button class="join-btn" onclick="document.getElementById('kyc-popup').style.display='flex'">Verify KYC</button>
                            </div>`;
                    } else {
                        pools.forEach(p => {
                            if(cibil >= p.limit) {
                                if(cibil < 700 && p.amt > 500) return; 
                                list.innerHTML += `
                                    <div class="pool-card">
                                        <div><b>${p.name}</b><br><small style="color:#64748b; font-weight:600;">₹${p.amt} • ${p.duration}</small></div>
                                        <button class="join-btn" onclick="location.href='bishi/pool-info.html'">JOIN</button>
                                    </div>`;
                            }
                        });
                    }
                }
            });
        }
    </script>
</body>
</html>
