<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard | Indian Bishi</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --text: #1e293b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 100px; }

        /* Premium Header */
        .header { background: linear-gradient(135deg, #7c3aed, #4f46e5); padding: 25px 20px 60px; color: white; border-radius: 0 0 30px 30px; position: relative; }
        .welcome-text { font-size: 13px; opacity: 0.9; }
        .user-name { font-size: 26px; font-weight: 800; margin-top: 2px; }
        .cibil-badge { position: absolute; right: 20px; top: 30px; background: rgba(255,255,255,0.2); padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 800; border: 1px solid rgba(255,255,255,0.3); backdrop-filter: blur(4px); }

        /* Premium Banner Mimic */
        .banner { margin: -30px 20px 25px; background: #111827; border-radius: 16px; padding: 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.15); position: relative; z-index: 10; border: 1px solid #374151; }
        .banner h3 { color: #fbbf24; font-size: 14px; margin: 0 0 5px; letter-spacing: 1px; }
        .banner h2 { color: #f59e0b; font-size: 26px; font-weight: 900; margin: 0 0 10px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .banner p { color: #d1d5db; font-size: 11px; margin: 0; font-weight: 600; }

        .section-title { padding: 0 20px; font-size: 18px; font-weight: 800; margin-bottom: 15px; color: #1e293b; display: flex; align-items: center; gap: 8px; }
        
        /* New Pool Card Design */
        .pools-container { padding: 0 20px; display: flex; flex-direction: column; gap: 15px; }
        .pool-card { background: white; padding: 20px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 8px 20px rgba(0,0,0,0.03); border: 1px solid #f1f5f9; }
        .pool-info h4 { margin: 0 0 4px; font-size: 17px; color: #6366f1; text-transform: uppercase; font-weight: 800; }
        .pool-info p { margin: 0; font-size: 13px; color: #64748b; font-weight: 600; }
        .join-btn { background: #6366f1; color: white; border: none; padding: 12px 24px; border-radius: 12px; font-weight: 800; font-size: 13px; cursor: pointer; box-shadow: 0 4px 10px rgba(99,102,241,0.3); }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; height: 80px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 -10px 30px rgba(0,0,0,0.05); z-index: 9999; border-top: 1px solid #f1f5f9; }
        .nav-item { text-decoration: none; color: #94a3b8; font-size: 10px; font-weight: 800; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 33.33%; height: 100%; gap: 5px; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 24px !important; }
    </style>
</head>
<body>

    <div class="header">
        <div class="welcome-text">Welcome back,</div>
        <div class="user-name" id="user-name">Loading...</div>
        <div class="cibil-badge">🛡️ CIBIL: 807</div>
    </div>

    <div class="banner">
        <h3>KEY FEATURES</h3>
        <h2>INDIAN BISHI</h2>
        <p>Trusted Community • Transparent • Growth</p>
    </div>

    <div class="section-title">Investment Pools 🏦</div>
    
    <div class="pools-container" id="investment-pools">
        <p style="text-align:center; color:#94a3b8; font-size:13px;">Fetching Live Pools...</p>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item active"><span class="nav-icon">🏠</span><span>HOME</span></a>
        <a href="bishi/all-pools.html" class="nav-item"><span class="nav-icon">🎯</span><span>MY BISHI</span></a>
        <a href="user/profile.html" class="nav-item"><span class="nav-icon">👤</span><span>ACCOUNT</span></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, get, child, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const app = initializeApp({ databaseURL: "https://indianbishi-pro-default-rtdb.firebaseio.com" });
        const db = getDatabase(app);
        const mobile = localStorage.getItem('activeUser');

        if(!mobile) window.location.href = "index.html";

        get(child(ref(db), `users/${mobile}`)).then((snap) => {
            if(snap.exists()) document.getElementById('user-name').innerText = snap.val().name;
        });

        onValue(ref(db, 'pools'), (snapshot) => {
            const container = document.getElementById('investment-pools');
            container.innerHTML = "";
            if(!snapshot.exists()) {
                container.innerHTML = "<p style='text-align:center'>No active pools found.</p>"; return;
            }

            snapshot.forEach((childSnapshot) => {
                const data = childSnapshot.val();
                container.innerHTML += `
                    <div class="pool-card">
                        <div class="pool-info">
                            <h4>${data.name}</h4>
                            <p>₹${data.amount} • ${data.months} Months</p>
                        </div>
                        <button class="join-btn" onclick="joinPool('${childSnapshot.key}', ${data.emi}, '${data.name}')">JOIN</button>
                    </div>
                `;
            });
        });

        // Fixed Path for Local and Hosted Redirects
        window.joinPool = (poolId, emiAmount, poolName) => {
            window.location.href = "user/payment.html?poolId=" + poolId + "&amount=" + emiAmount + "&name=" + encodeURIComponent(poolName);
        };
    </script>
</body>
</html>
