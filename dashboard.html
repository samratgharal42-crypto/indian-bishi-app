<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Indian Bishi | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --text: #1e293b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; color: var(--text); padding-bottom: 90px; }

        /* Header UI */
        .header { background: linear-gradient(135deg, #6366f1, #a855f7); padding: 30px 20px 70px; border-radius: 0 0 35px 35px; color: white; position: relative; }
        .user-greet { font-size: 13px; opacity: 0.9; }
        .user-name { font-size: 24px; font-weight: 800; margin-top: 5px; }
        .trust-badge { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.2); padding: 6px 12px; border-radius: 12px; font-size: 11px; font-weight: 800; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.3); }

        /* Wallet Cards */
        .stats-container { display: flex; gap: 15px; margin: -40px 20px 25px; position: relative; z-index: 10; }
        .stat-box { flex: 1; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); text-align: center; border: 1px solid #f1f5f9; }
        .stat-val { display: block; font-size: 22px; font-weight: 800; color: var(--primary); }
        .stat-lbl { font-size: 10px; color: #94a3b8; font-weight: 800; text-transform: uppercase; margin-top: 5px; }

        /* Pool Cards */
        .section-title { padding: 0 20px; font-weight: 800; font-size: 18px; margin-bottom: 15px; }
        .pool-card { background: white; border-radius: 20px; padding: 20px; margin: 0 20px 15px; display: flex; align-items: center; justify-content: space-between; border: 1px solid #f1f5f9; }
        .pool-name { font-weight: 800; font-size: 15px; color: #1e293b; }
        .pool-meta { font-size: 12px; color: #64748b; font-weight: 600; }
        .view-btn { padding: 10px 18px; background: #6366f1; color: white; border-radius: 12px; font-weight: 800; font-size: 12px; border: none; cursor: pointer; }

        /* PROFESSIONAL POPUP STYLES */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
        .popup { background: white; width: 100%; max-width: 340px; border-radius: 28px; padding: 30px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.2); animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .popup-icon { font-size: 50px; margin-bottom: 15px; }
        .popup h3 { margin: 0 0 10px; font-size: 20px; font-weight: 800; }
        .popup p { font-size: 14px; color: #64748b; line-height: 1.5; margin-bottom: 25px; }
        
        .popup-btn { width: 100%; padding: 16px; border-radius: 14px; font-weight: 800; font-size: 14px; cursor: pointer; margin-bottom: 10px; border: none; }
        .btn-main { background: var(--primary); color: white; }
        .btn-sec { background: #f1f5f9; color: #475569; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; height: 75px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 -10px 30px rgba(0,0,0,0.05); z-index: 1000; border-top: 1px solid #f1f5f9; }
    </style>
</head>
<body>

    <div class="header">
        <div class="trust-badge">🛡️ Score: <span id="cibil-display">Pending</span></div>
        <div class="user-greet">Welcome back,</div>
        <div class="user-name" id="user-display">Loading...</div>
    </div>

    <div class="stats-container">
        <div class="stat-box">
            <span class="stat-val" id="bal-display">$0.00</span>
            <span class="stat-lbl">Wallet</span>
        </div>
        <div class="stat-box">
            <span class="stat-val">0</span>
            <span class="stat-lbl">My Pools</span>
        </div>
    </div>

    <div class="section-title">Investment Lobby</div>

    <div class="pool-card">
        <div class="pool-info">
            <div class="pool-name">Micro Daily Pool</div>
            <div class="pool-meta">₹50 / Day • 60 Days</div>
        </div>
        <button class="view-btn" onclick="handleEntry()">JOIN</button>
    </div>

    <div class="overlay" id="kyc-overlay">
        <div class="popup">
            <div class="popup-icon">🛡️</div>
            <h3>Verification Required</h3>
            <p>To ensure platform safety, please complete your Aadhaar & PAN verification to fetch your CIBIL score.</p>
            
            <button class="popup-btn btn-main" onclick="location.href='kyc.html'">Verify Now</button>
            <button class="popup-btn btn-sec" onclick="location.href='support.html'">Help & Support</button>
        </div>
    </div>

    <nav class="bottom-nav">
        </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const app = initializeApp({ databaseURL: "https://indianbishi-pro-default-rtdb.firebaseio.com" });
        const db = getDatabase(app);
        const mobile = localStorage.getItem('activeUser');
        let hasCibil = false;

        if(mobile) {
            get(child(ref(db), `users/${mobile}`)).then((snap) => {
                if(snap.exists()){
                    const data = snap.val();
                    document.getElementById('user-display').innerText = data.name;
                    if(data.cibil) {
                        document.getElementById('cibil-display').innerText = data.cibil;
                        hasCibil = true;
                    }
                }
            });
        }

        window.handleEntry = () => {
            if(!hasCibil) {
                document.getElementById('kyc-overlay').style.display = 'flex';
            } else {
                location.href = 'bishi/pool-info.html';
            }
        };

        // Close popup if clicked outside
        window.onclick = function(event) {
            if (event.target == document.getElementById('kyc-overlay')) {
                document.getElementById('kyc-overlay').style.display = "none";
            }
        }
    </script>
</body>
</html>
