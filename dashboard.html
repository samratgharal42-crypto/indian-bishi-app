<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Indian Bishi | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --text: #1e293b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; color: var(--text); padding-bottom: 90px; overflow-x: hidden; }

        /* Header Style */
        .header { background: linear-gradient(135deg, #6366f1, #a855f7); padding: 30px 20px 60px; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; color: white; position: relative; }
        .user-greet { font-size: 13px; opacity: 0.9; }
        .user-name { font-size: 24px; font-weight: 800; margin-top: 5px; }
        .trust-badge { position: absolute; top: 35px; right: 20px; background: rgba(255,255,255,0.2); padding: 8px 15px; border-radius: 14px; font-size: 11px; font-weight: 800; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.3); display: flex; align-items: center; gap: 5px;}

        /* SLIDING BANNER SECTION */
        .banner-slider { margin: -30px 20px 25px; overflow: hidden; border-radius: 24px; box-shadow: 0 15px 30px rgba(0,0,0,0.1); background: white; height: 160px; position: relative; z-index: 10; }
        .slides { display: flex; width: 300%; height: 100%; animation: slide 15s infinite; }
        
        /* BANNER TEXT HERE: s1, s2, s3 classes madhe badal kara */
        .slide { width: 33.33%; height: 100%; display: flex; align-items: center; justify-content: center; font-weight: 800; color: white; text-align: center; padding: 20px; font-size: 16px; }
        .s1 { background: linear-gradient(45deg, #ff9a9e, #fad0c4); }
        .s2 { background: linear-gradient(45deg, #a1c4fd, #c2e9fb); }
        .s3 { background: linear-gradient(45deg, #84fab0, #8fd3f4); }
        @keyframes slide { 0% { margin-left: 0; } 33% { margin-left: -100%; } 66% { margin-left: -200%; } 100% { margin-left: 0; } }

        /* Available Bishi */
        .lobby-content { padding: 0 20px; }
        .section-title { padding: 0; font-weight: 800; font-size: 19px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; color: var(--text); }
        .pool-card { background: white; border-radius: 24px; padding: 20px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 15px rgba(0,0,0,0.02); border: 1px solid #f1f5f9; }
        .pool-name { font-weight: 800; font-size: 15px; color: #1e293b; margin-bottom: 4px;}
        .view-btn { padding: 12px 24px; background: #6366f1; color: white; border-radius: 14px; font-weight: 800; font-size: 13px; text-decoration: none; border: none; cursor: pointer; box-shadow: 0 8px 15px rgba(99, 102, 241, 0.2); }

        /* Bottom Navigation */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; height: 80px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 -10px 40px rgba(0,0,0,0.05); z-index: 999; border-top: 1px solid #f1f5f9; }
        .nav-item { text-decoration: none; color: #94a3b8; font-size: 10px; font-weight: 800; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>

    <div class="header">
        <div class="trust-badge">🛡️ Score: <span id="cibil-display">Pending</span></div>
        <div class="user-greet">Namaste, Welcome Back!</div>
        <div class="user-name" id="user-display">Loading...</div>
    </div>

    <div class="banner-slider">
        <div class="slides">
            <div class="slide s1">🔥 Festive Offer:<br>Join Pool & Get 5% Cashback</div>
            <div class="slide s2">💎 Premium Membership:<br>Unlock 800+ CIBIL Pools</div>
            <div class="slide s3">🚀 Quick Payouts:<br>Instant Withdrawal Active</div>
        </div>
    </div>

    <div class="lobby-content">
        <div class="section-title">Available Bishi 🏛️</div>

        <div class="pool-card">
            <div>
                <div class="pool-name">Starter Weekly</div>
                <small style="color: #64748b; font-weight: 600;">Entry: ₹500/week</small>
            </div>
            <a href="/indian-bishi-app/bishi/pool-info.html" class="view-btn">JOIN</a>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="/indian-bishi-app/dashboard.html" class="nav-item active">🏠<span>HOME</span></a>
        <a href="/indian-bishi-app/bishi/all-pools.html" class="nav-item">🎯<span>MY BISHI</span></a>
        <a href="/indian-bishi-app/user/profile.html" class="nav-item">👤<span>ACCOUNT</span></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // IMPORTANT: databaseURL update kara
        const app = initializeApp({ databaseURL: "https://indianbishi-pro-default-rtdb.firebaseio.com" });
        const db = getDatabase(app);

        // Fetch User Data
        const userMobile = localStorage.getItem('activeUser');
        if(!userMobile) {
            window.location.href = "/indian-bishi-app/index.html"; 
        } else {
            get(child(ref(db), `users/${userMobile}`)).then((snapshot) => {
                if (snapshot.exists()) {
                    document.getElementById('user-display').innerText = snapshot.val().name;
                    // CIBIL Score display, initially "Pending" unless set in Firebase
                    if(snapshot.val().cibil) {
                        document.getElementById('cibil-display').innerText = snapshot.val().cibil;
                    }
                }
            });
        }
    </script>
</body>
</html>
