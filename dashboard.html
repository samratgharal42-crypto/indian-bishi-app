<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard | Indian Bishi</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --text: #1e293b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 100px; }

        .header { background: linear-gradient(135deg, #6366f1, #a855f7); padding: 25px 20px 40px; color: white; border-radius: 0 0 30px 30px; }
        .welcome-text { font-size: 13px; opacity: 0.9; }
        .user-name { font-size: 24px; font-weight: 800; }
        .cibil-badge { background: rgba(255,255,255,0.2); padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 800; float: right; margin-top: -35px; }

        .banner { margin: -20px 20px 20px; border-radius: 16px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.1); background: #1e293b; color: #fbbf24; text-align: center; padding: 20px; }
        
        .section-title { padding: 0 20px; font-size: 18px; font-weight: 800; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        
        .pools-container { padding: 0 20px; display: flex; flex-direction: column; gap: 15px; }
        .pool-card { background: white; padding: 18px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 5px 15px rgba(0,0,0,0.02); border: 1px solid #f1f5f9; }
        .pool-info h4 { margin: 0 0 5px; font-size: 16px; color: var(--primary); }
        .pool-info p { margin: 0; font-size: 12px; color: #64748b; font-weight: 600; }
        .join-btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 10px; font-weight: 800; cursor: pointer; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; height: 80px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 -10px 30px rgba(0,0,0,0.05); z-index: 9999; border-top: 1px solid #f1f5f9; }
        .nav-item { text-decoration: none; color: #94a3b8; font-size: 10px; font-weight: 800; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 33.33%; height: 100%; gap: 5px; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 24px !important; }
    </style>
</head>
<body>

    <div class="header">
        <div class="welcome-text">Welcome back,</div>
        <div class="user-name" id="user-name">Loading...</div>
        <div class="cibil-badge">🛡️ CIBIL: 807</div>
    </div>

    <div class="banner">
        <h3 style="margin:0;">KEY FEATURES</h3>
        <h2 style="margin:5px 0; font-size:26px; font-weight:900;">INDIAN BISHI</h2>
        <p style="margin:0; font-size:12px; opacity:0.8;">Trusted Community • Transparent • Growth</p>
    </div>

    <div class="section-title">Investment Pools 🏦</div>
    
    <div class="pools-container" id="investment-pools">
        <p style="text-align:center; color:#94a3b8; font-size:13px;">Fetching Live Pools...</p>
    </div>

    <nav class="bottom-nav">
        <a href="/indian-bishi-app/dashboard.html" class="nav-item active"><span class="nav-icon">🏠</span><span>HOME</span></a>
        <a href="/indian-bishi-app/bishi/all-pools.html" class="nav-item"><span class="nav-icon">🎯</span><span>MY BISHI</span></a>
        <a href="/indian-bishi-app/user/profile.html" class="nav-item"><span class="nav-icon">👤</span><span>ACCOUNT</span></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, get, child, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const app = initializeApp({ databaseURL: "https://indianbishi-pro-default-rtdb.firebaseio.com" });
        const db = getDatabase(app);
        const mobile = localStorage.getItem('activeUser');

        if(!mobile) window.location.href = "index.html";

        // Get User Name
        get(child(ref(db), `users/${mobile}`)).then((snap) => {
            if(snap.exists()) document.getElementById('user-name').innerText = snap.val().name;
        });

        // Load All Active Pools
        onValue(ref(db, 'pools'), (snapshot) => {
            const container = document.getElementById('investment-pools');
            container.innerHTML = "";
            if(!snapshot.exists()) {
                container.innerHTML = "<p style='text-align:center'>No active pools found.</p>"; return;
            }

            snapshot.forEach((childSnapshot) => {
                const data = childSnapshot.val();
                container.innerHTML += `
                    <div class="pool-card">
                        <div class="pool-info">
                            <h4>${data.name}</h4>
                            <p>₹${data.amount} • ${data.months} Months</p>
                        </div>
                        <button class="join-btn" onclick="joinPool('${childSnapshot.key}', ${data.emi}, '${data.name}')">JOIN</button>
                    </div>
                `;
            });
        });

        // Redirect to Payment with Pool Details
        window.joinPool = (poolId, emiAmount, poolName) => {
            window.location.href = `/indian-bishi-app/user/payment.html?poolId=${poolId}&amount=${emiAmount}&name=${encodeURIComponent(poolName)}`;
        };
    </script>
</body>
</html>
