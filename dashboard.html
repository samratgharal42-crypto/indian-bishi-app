<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Indian Bishi | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; padding-bottom: 90px; }
        .header { background: linear-gradient(135deg, #6366f1, #a855f7); padding: 30px 20px 50px; border-bottom-left-radius: 35px; border-bottom-right-radius: 35px; color: white; }
        .user-name { font-size: 26px; font-weight: 800; margin-top: 5px; }
        .stat-card { background: white; margin: -30px 20px 20px; padding: 20px; border-radius: 20px; display: flex; justify-content: space-between; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; }
        .stat-item { text-align: center; flex: 1; }
        .stat-val { display: block; font-size: 20px; font-weight: 800; color: var(--primary); }
        .stat-lbl { font-size: 10px; color: #94a3b8; font-weight: 800; text-transform: uppercase; }
        .section-title { padding: 0 20px; font-weight: 800; font-size: 18px; margin-bottom: 15px; }
        .pool-card { background: white; margin: 0 20px 15px; padding: 20px; border-radius: 20px; display: flex; align-items: center; justify-content: space-between; border: 1px solid #f1f5f9; }
        .pool-name { font-weight: 800; font-size: 15px; color: #1e293b; }
        .view-btn { padding: 10px 20px; background: #eef2ff; color: var(--primary); border-radius: 12px; font-weight: 800; text-decoration: none; font-size: 12px; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; height: 75px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 -10px 30px rgba(0,0,0,0.05); border-top: 1px solid #f1f5f9; }
        .nav-link { text-decoration: none; color: #94a3b8; font-size: 10px; font-weight: 800; text-align: center; }
        .active-nav { color: var(--primary); }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-size: 12px; opacity: 0.8;">Namaste, Welcome Back!</div>
        <div class="user-name" id="user-display">Loading...</div>
    </div>

    <div class="stat-card">
        <div class="stat-item"><span class="stat-val" id="bal-display">₹0.00</span><span class="stat-lbl">Wallet</span></div>
        <div style="width: 1px; background: #f1f5f9;"></div>
        <div class="stat-item"><span class="stat-val">0</span><span class="stat-lbl">Active Bishi</span></div>
    </div>

    <div class="section-title">Available Bishi 🏛️</div>

    <div class="pool-card">
        <div><div class="pool-name">Starter Weekly</div><small style="color:#64748b">₹500 / week</small></div>
        <a href="bishi/pool-info.html" class="view-btn">VIEW</a>
    </div>

    <div class="pool-card">
        <div><div class="pool-name">Premium Monthly</div><small style="color:#64748b">₹5000 / month</small></div>
        <a href="bishi/pool-info.html" class="view-btn">VIEW</a>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-link active-nav">🏠<br>HOME</a>
        <a href="bishi/all-pools.html" class="nav-link">🎯<br>MY BISHI</a>
        <a href="user/profile.html" class="nav-link">👤<br>ACCOUNT</a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const app = initializeApp({ databaseURL: "https://indianbishi-pro-default-rtdb.firebaseio.com" });
        const db = getDatabase(app);
        const mobile = localStorage.getItem('activeUser');

        if(!mobile) { window.location.href = "index.html"; }
        else {
            get(child(ref(db), `users/${mobile}`)).then((snap) => {
                if(snap.exists()){
                    document.getElementById('user-display').innerText = snap.val().name;
                    document.getElementById('bal-display').innerText = "₹" + (snap.val().balance || 0).toFixed(2);
                }
            });
        }
    </script>
</body>
</html>
