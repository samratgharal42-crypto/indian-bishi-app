<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Master Control | Indian Bishi</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0f172a; --accent: #6366f1; --bg: #f1f5f9; --text: #1e293b; --danger: #ef4444; --success: #10b981; --warning: #f59e0b; }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); padding-bottom: 50px; }

        /* AUTH SCREEN */
        #auth-screen { position: fixed; inset: 0; background: var(--primary); z-index: 10000; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .auth-box { background: white; padding: 30px; border-radius: 24px; width: 100%; max-width: 350px; text-align: center; }
        .auth-box input { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #e2e8f0; font-size: 24px; text-align: center; margin-bottom: 15px; letter-spacing: 8px; }
        .auth-box button { width: 100%; background: var(--accent); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 800; cursor: pointer; }

        /* MAIN DASHBOARD */
        #main-dashboard { display: none; }
        .header { background: var(--primary); color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        
        .tab-bar { display: flex; background: white; border-bottom: 1px solid #e2e8f0; overflow-x: auto; position: sticky; top: 60px; z-index: 100; }
        .tab { flex: none; padding: 15px 20px; font-weight: 800; font-size: 12px; color: #64748b; cursor: pointer; white-space: nowrap; }
        .tab.active { color: var(--accent); border-bottom: 3px solid var(--accent); }

        .container { padding: 15px; }
        .card { background: white; padding: 15px; border-radius: 16px; border: 1px solid #e2e8f0; margin-bottom: 15px; }
        .card h3 { font-size: 14px; margin-bottom: 12px; border-bottom: 1px solid #f1f5f9; padding-bottom: 8px; }

        /* LISTS & BUTTONS */
        .list-item { background: #f8fafc; padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 10px; }
        .badge { font-size: 10px; font-weight: 800; padding: 3px 8px; border-radius: 6px; }
        .bg-success { background: #d1fae5; color: #065f46; }
        .bg-warning { background: #fef3c7; color: #92400e; }
        
        .btn-row { display: flex; gap: 8px; margin-top: 10px; }
        .btn { flex: 1; border: none; padding: 10px; border-radius: 8px; font-weight: 800; font-size: 11px; cursor: pointer; color: white; }
        .btn-blue { background: var(--accent); }
        .btn-red { background: var(--danger); }
        .btn-green { background: var(--success); }

        input, select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; margin-bottom: 10px; font-size: 14px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <h2 style="margin-bottom:20px">Admin Access</h2>
            <input type="password" id="pin" placeholder="••••" maxlength="4">
            <button onclick="login()">Login 🔓</button>
        </div>
    </div>

    <div id="main-dashboard">
        <div class="header">
            <h2 style="font-size:16px">Indian Bishi Admin</h2>
            <button onclick="location.reload()" style="background:none; border:1px solid white; color:white; padding:4px 8px; border-radius:6px; font-size:10px;">Logout</button>
        </div>

        <div class="tab-bar">
            <div class="tab active" onclick="showTab('pools')">POOLS</div>
            <div class="tab" onclick="showTab('users')">USERS</div>
            <div class="tab" onclick="showTab('requests')">PAY REQUESTS 🔔</div>
            <div class="tab" onclick="showTab('txns')">ALL TXNS</div>
        </div>

        <div class="container">
            <div id="tab-pools" class="tab-content">
                <div class="card">
                    <h3>➕ Create New Pool</h3>
                    <input type="text" id="p-name" placeholder="Pool Name (e.g. Silver 25K)">
                    <input type="number" id="p-amt" placeholder="Total Amount">
                    <input type="number" id="p-emi" placeholder="Monthly EMI">
                    <input type="number" id="p-months" placeholder="Duration (Months)">
                    <button class="btn btn-green" style="width:100%" onclick="createPool()">Create Pool 🚀</button>
                </div>
                <div id="pools-list"></div>
            </div>

            <div id="tab-users" class="tab-content" style="display:none">
                <div id="users-list"></div>
            </div>

            <div id="tab-requests" class="tab-content" style="display:none">
                <div class="card">
                    <h3>🔔 Pending Deposits</h3>
                    <div id="requests-list"></div>
                </div>
            </div>

            <div id="tab-txns" class="tab-content" style="display:none">
                <div id="global-txns"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const app = initializeApp({ databaseURL: "https://indianbishi-pro-default-rtdb.firebaseio.com" });
        const db = getDatabase(app);

        window.login = () => {
            if(document.getElementById('pin').value === "1234") {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-dashboard').style.display = 'block';
                init();
            } else { alert("Wrong PIN!"); }
        };

        window.showTab = (name) => {
            document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + name).style.display = 'block';
            event.target.classList.add('active');
        };

        const init = () => {
            loadPools();
            loadUsers();
            loadRequests();
            loadTxns();
        };

        // --- POOLS LOGIC ---
        window.createPool = () => {
            const name = document.getElementById('p-name').value;
            const amt = parseInt(document.getElementById('p-amt').value);
            const emi = parseInt(document.getElementById('p-emi').value);
            const months = parseInt(document.getElementById('p-months').value);
            if(!name || !amt) return;
            push(ref(db, 'pools'), { name, amount: amt, emi, months, joined: 0, status: "Open" });
            alert("Pool Live!");
        };

        const loadPools = () => {
            onValue(ref(db, 'pools'), snap => {
                const list = document.getElementById('pools-list');
                list.innerHTML = "";
                snap.forEach(c => {
                    const d = c.val();
                    list.innerHTML += `<div class="list-item"><b>${d.name}</b> (₹${d.amount})<br><button class="btn btn-red" onclick="deletePool('${c.key}')">Delete</button></div>`;
                });
            });
        };
        window.deletePool = id => remove(ref(db, 'pools/' + id));

        // --- USERS & WALLET ---
        const loadUsers = () => {
            onValue(ref(db, 'users'), snap => {
                const list = document.getElementById('users-list');
                list.innerHTML = "";
                snap.forEach(c => {
                    const d = c.val();
                    list.innerHTML += `
                        <div class="card">
                            <b>${d.name}</b> (+91 ${c.key})<br>
                            <span class="badge bg-success">Balance: ₹${(d.balance || 0).toFixed(2)}</span>
                            <div class="btn-row">
                                <button class="btn btn-blue" onclick="adjustWallet('${c.key}', ${d.balance || 0}, 'add')">Add Money</button>
                                <button class="btn btn-red" onclick="adjustWallet('${c.key}', ${d.balance || 0}, 'minus')">Deduct</button>
                            </div>
                        </div>`;
                });
            });
        };

        window.adjustWallet = (mob, cur, type) => {
            let amt = parseFloat(prompt("Enter Amount:"));
            if(!amt) return;
            let newBal = type === 'add' ? cur + amt : cur - amt;
            update(ref(db, 'users/' + mob), { balance: newBal });
            push(ref(db, 'transactions'), {
                userMobile: mob, amount: amt, type: type === 'add' ? 'Credit' : 'Debit',
                title: type === 'add' ? "Admin Deposit" : "Admin Deduction",
                date: new Date().toLocaleString(), id: "AD"+Date.now()
            });
        };

        // --- PAY REQUESTS LOGIC ---
        const loadRequests = () => {
            onValue(ref(db, 'pay_requests'), snap => {
                const list = document.getElementById('requests-list');
                list.innerHTML = snap.exists() ? "" : "No pending requests.";
                snap.forEach(c => {
                    const d = c.val();
                    list.innerHTML += `
                        <div class="list-item">
                            <b>₹${d.amount}</b> from ${d.userMobile}<br>
                            <span class="badge bg-warning">Pending Approval</span>
                            <div class="btn-row">
                                <button class="btn btn-green" onclick="approvePay('${c.key}', '${d.userMobile}', ${d.amount})">Approve ✅</button>
                                <button class="btn btn-red" onclick="deleteReq('${c.key}')">Reject</button>
                            </div>
                        </div>`;
                });
            });
        };

        window.approvePay = (reqId, mob, amt) => {
            update(ref(db, `users/${mob}`), { balance: (window.userBal || 0) + amt }); // Note: Simplified bal fetch
            push(ref(db, 'transactions'), { userMobile: mob, amount: amt, type: 'Credit', title: "Deposit via App", date: new Date().toLocaleString(), id: reqId });
            remove(ref(db, 'pay_requests/' + reqId));
            alert("Payment Approved!");
        };
        window.deleteReq = id => remove(ref(db, 'pay_requests/' + id));

        const loadTxns = () => {
            onValue(ref(db, 'transactions'), snap => {
                const list = document.getElementById('global-txns');
                list.innerHTML = "<h3>Recent History</h3>";
                snap.forEach(c => {
                    const d = c.val();
                    list.innerHTML += `<div class="list-item" style="font-size:11px">${d.date}: ${d.userMobile} - ${d.type} ₹${d.amount}</div>`;
                });
            });
        };
    </script>
</body>
</html>
