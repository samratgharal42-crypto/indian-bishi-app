<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f1f5f9; --primary: #0f172a; --accent: #6366f1; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; }
        .header { background: var(--primary); color: white; padding: 20px; display: flex; justify-content: space-between; }
        .tab-bar { display: flex; background: white; overflow-x: auto; border-bottom: 1px solid #cbd5e1; }
        .tab { padding: 15px; font-size: 12px; font-weight: 800; cursor: pointer; border-bottom: 3px solid transparent; }
        .tab.active { color: var(--accent); border-bottom: 3px solid var(--accent); }
        .container { padding: 15px; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #e2e8f0; }
        .list-item { background: #f8fafc; padding: 12px; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 10px; font-size: 13px; }
        .btn { padding: 8px; border: none; border-radius: 6px; font-weight: 800; color: white; cursor: pointer; }
        .bg-green { background: #10b981; } .bg-red { background: #ef4444; } .bg-blue { background: #6366f1; }
    </style>
</head>
<body>

    <div class="header"><h2>Admin Panel</h2></div>
    <div class="tab-bar">
        <div class="tab active" onclick="showTab('dep')">DEPOSITS (UTR)</div>
        <div class="tab" onclick="showTab('with')">WITHDRAWALS 🏆</div>
        <div class="tab" onclick="showTab('bids')">LIVE BIDS 👁️</div>
    </div>

    <div class="container">
        <div id="tab-dep" class="tab-content">
            <div class="card">
                <h3 style="margin-bottom:10px;">📥 UTR Verification</h3>
                <div id="dep-list">Loading...</div>
            </div>
        </div>

        <div id="tab-with" class="tab-content" style="display:none;">
            <div class="card">
                <h3 style="margin-bottom:10px;">🏆 Pool Winners Payouts</h3>
                <div id="with-list">No winners yet.</div>
            </div>
        </div>

        <div id="tab-bids" class="tab-content" style="display:none;">
            <div class="card">
                <h3 style="margin-bottom:10px;">👁️ Watch Live Bidding</h3>
                <p style="font-size:12px; color:red;">Admin View: Mobile Numbers are visible to you only.</p>
                <div id="bids-list">Loading...</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, push, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const app = initializeApp({ databaseURL: "https://indianbishi-pro-default-rtdb.firebaseio.com" });
        const db = getDatabase(app);

        window.showTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(e => e.style.display = 'none');
            document.querySelectorAll('.tab').forEach(e => e.classList.remove('active'));
            document.getElementById('tab-' + id).style.display = 'block';
            event.target.classList.add('active');
        };

        // 1. UTR Deposits
        onValue(ref(db, 'deposits'), snap => {
            const list = document.getElementById('dep-list'); list.innerHTML = "";
            snap.forEach(c => {
                const d = c.val();
                if(d.status === "Pending") {
                    // Smart Logic Simulation: If UTR has 12 digits, it's valid format.
                    let utrStatus = d.utr.length === 12 ? "<span style='color:green'>Format Match</span>" : "<span style='color:red'>Format Fail</span>";
                    
                    list.innerHTML += `
                        <div class="list-item">
                            <b>₹${d.amount}</b> | +91 ${d.userMobile}<br>
                            UTR: ${d.utr} (${utrStatus})<br>
                            <div style="margin-top:10px;">
                                <button class="btn bg-green" onclick="appr('${c.key}', '${d.userMobile}', ${d.amount}, '${d.poolId}')">Match & Accept</button>
                                <button class="btn bg-red" onclick="rej('${c.key}', '${d.userMobile}', ${d.amount})">Failed Reject</button>
                            </div>
                        </div>`;
                }
            });
        });

        window.appr = (id, mob, amt, pId) => {
            if(pId && pId !== "undefined") update(ref(db, `users/${mob}/joined_pools`), { [pId]: true });
            push(ref(db, 'transactions'), { userMobile: mob, amount: amt, type: 'Credit', status: 'Success', title: "Deposit Approved", date: new Date().toLocaleDateString() });
            update(ref(db, 'deposits/'+id), { status: 'Approved' });
        };
        window.rej = (id, mob, amt) => {
            push(ref(db, 'transactions'), { userMobile: mob, amount: amt, type: 'Failed', status: 'Rejected', title: "Deposit Rejected (UTR Invalid)", date: new Date().toLocaleDateString() });
            update(ref(db, 'deposits/'+id), { status: 'Rejected' });
        };

        // 2. Winners (Withdrawals)
        onValue(ref(db, 'withdrawals'), snap => {
            const list = document.getElementById('with-list'); list.innerHTML = "";
            snap.forEach(c => {
                const d = c.val();
                if(d.status === "Pending Payout") {
                    list.innerHTML += `
                        <div class="list-item" style="border-left:4px solid #10b981;">
                            <b>Winner: +91 ${d.winnerMobile}</b><br>
                            Win Amount: <b style="font-size:18px; color:#10b981;">₹${d.amount}</b><br>
                            <button class="btn bg-blue" style="margin-top:5px; width:100%" onclick="paidOut('${c.key}')">Mark as Paid Out ✅</button>
                        </div>`;
                }
            });
        });
        window.paidOut = id => update(ref(db, 'withdrawals/'+id), { status: "Paid" });

        // 3. Live Bids Monitor
        onValue(ref(db, 'bids'), snap => {
            const list = document.getElementById('bids-list'); list.innerHTML = "";
            snap.forEach(pool => {
                list.innerHTML += `<h4 style="margin:10px 0 5px;">Pool: ${pool.key}</h4>`;
                pool.forEach(bid => {
                    const b = bid.val();
                    list.innerHTML += `<div class="list-item" style="padding:5px 10px;">${b.time} | <b>+91 ${b.user}</b> asked ₹${b.amount}</div>`;
                });
            });
        });
    </script>
</body>
</html>
