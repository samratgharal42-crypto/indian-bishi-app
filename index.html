<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Indian Bishi | Secure Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4318ff; --bg: #f4f7fe; --text: #2b3674; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .auth-card { background: white; padding: 40px 25px; border-radius: 32px; box-shadow: 0 20px 50px rgba(0,0,0,0.04); width: 100%; max-width: 400px; text-align: center; }
        .logo { background: linear-gradient(135deg, var(--primary), #b089ff); width: 64px; height: 64px; border-radius: 20px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; color: white; font-size: 28px; }
        h1 { color: var(--text); font-size: 24px; font-weight: 800; margin-bottom: 8px; }
        input { width: 100%; padding: 16px; border: 2px solid #f4f7fe; border-radius: 16px; font-size: 16px; background: #f8fafc; outline: none; margin-bottom: 20px; font-weight: 600; }
        .btn { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 18px; cursor: pointer; font-size: 16px; font-weight: 700; }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="logo">🏛️</div>
        <h1>Welcome Back</h1>
        <p style="color: #a3aed1; font-size: 14px; margin-bottom: 30px;">Login to manage your bishi pools.</p>
        
        <input type="tel" id="mobile" placeholder="Mobile Number" maxlength="10">
        <button class="btn" onclick="handleLogin()">Login</button>
        
        <div style="margin-top:20px; border-top:1px dashed #eee; padding-top:15px;">
            <a href="admin/panel.html" style="color:#a3aed1; text-decoration:none; font-size:12px; font-weight:600;">⚙️ Admin Access</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBjKtNm0nLIXeKG7YRBrsIQah9G1mL-UQM",
            authDomain: "indianbishi-pro.firebaseapp.com",
            projectId: "indianbishi-pro",
            storageBucket: "indianbishi-pro.firebasestorage.app",
            messagingSenderId: "274772179441",
            appId: "1:274772179441:web:a0fac89f47c6bae6e52c50"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.handleLogin = function() {
            const mobile = document.getElementById('mobile').value;
            if(mobile.length === 10) {
                // युजरचा डेटा डेटाबेसमध्ये सेव्ह करणे (Real-time)
                set(ref(db, 'users/' + mobile), {
                    lastLogin: new Date().toLocaleString(),
                    status: "Online"
                }).then(() => {
                    window.location.href = "user/dashboard.html";
                });
            } else {
                alert("Please enter a valid 10-digit number!");
            }
        }
    </script>
</body>
</html>
