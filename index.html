<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Indian Bishi | Premium Auth</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --secondary: #a855f7; --bg: #0f172a; --card: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at top right, #2e1065, #0f172a);
            min-height: 100vh; margin: 0; display: flex; justify-content: center; align-items: center; padding: 20px;
            color: white; overflow: hidden;
        }

        /* Animated Background Blobs */
        .blob { position: absolute; width: 300px; height: 300px; background: var(--primary); filter: blur(80px); border-radius: 50%; z-index: -1; opacity: 0.4; animation: move 10s infinite alternate; }
        @keyframes move { from { transform: translate(-50%, -50%); } to { transform: translate(50%, 50%); } }

        .auth-container { 
            background: var(--card); backdrop-filter: blur(20px); 
            border: 1px solid rgba(255,255,255,0.1); padding: 40px 30px;
            border-radius: 35px; width: 100%; max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .tabs { display: flex; background: rgba(0,0,0,0.2); border-radius: 15px; margin-bottom: 30px; padding: 5px; }
        .tab { flex: 1; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 700; font-size: 14px; text-align: center; }
        .active-tab { background: var(--primary); color: white; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4); }

        .logo { font-size: 40px; margin-bottom: 10px; }
        h1 { font-size: 28px; font-weight: 800; margin: 0 0 10px; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .input-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 12px; font-weight: 600; color: #94a3b8; margin-bottom: 8px; margin-left: 5px; }
        input { 
            width: 100%; padding: 16px; background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 18px; 
            color: white; font-size: 16px; outline: none;
        }
        input:focus { border-color: var(--primary); background: rgba(255,255,255,0.1); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }

        .btn { 
            width: 100%; padding: 18px; background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; border: none; border-radius: 18px; font-size: 16px; font-weight: 800;
            cursor: pointer; margin-top: 10px; box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.5);
        }
        .btn:active { transform: scale(0.98); }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="blob"></div>

    <div class="auth-container">
        <div class="logo">🏛️</div>
        <h1>Indian Bishi</h1>
        <p style="color: #94a3b8; font-size: 14px; margin-bottom: 30px;">Premium Financial Platform</p>

        <div class="tabs">
            <div id="tab-login" class="tab active-tab" onclick="toggleAuth('login')">Login</div>
            <div id="tab-reg" class="tab" onclick="toggleAuth('reg')">Register</div>
        </div>

        <div id="form-login">
            <div class="input-group">
                <label>MOBILE NUMBER</label>
                <input type="tel" id="l-mobile" placeholder="Enter 10 digit number">
            </div>
            <div class="input-group">
                <label>PASSWORD</label>
                <input type="password" id="l-pass" placeholder="••••••••">
            </div>
            <button class="btn" onclick="handleAuth('login')">Access Dashboard</button>
        </div>

        <div id="form-reg" class="hidden">
            <div class="input-group">
                <label>FULL NAME</label>
                <input type="text" id="r-name" placeholder="Ritesh Gharal">
            </div>
            <div class="input-group">
                <label>MOBILE NUMBER</label>
                <input type="tel" id="r-mobile" placeholder="Enter 10 digit number">
            </div>
            <div class="input-group">
                <label>CREATE PASSWORD</label>
                <input type="password" id="r-pass" placeholder="••••••••">
            </div>
            <button class="btn" onclick="handleAuth('reg')">Create Account</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBjKtNm0nLIXeKG7YRBrsIQah9G1mL-UQM",
            authDomain: "indianbishi-pro.firebaseapp.com",
            projectId: "indianbishi-pro",
            storageBucket: "indianbishi-pro.firebasestorage.app",
            messagingSenderId: "274772179441",
            appId: "1:274772179441:web:a0fac89f47c6bae6e52c50"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // UI Toggles
        window.toggleAuth = (type) => {
            if(type === 'login') {
                document.getElementById('form-login').classList.remove('hidden');
                document.getElementById('form-reg').classList.add('hidden');
                document.getElementById('tab-login').classList.add('active-tab');
                document.getElementById('tab-reg').classList.remove('active-tab');
            } else {
                document.getElementById('form-login').classList.add('hidden');
                document.getElementById('form-reg').classList.remove('hidden');
                document.getElementById('tab-reg').classList.add('active-tab');
                document.getElementById('tab-login').classList.remove('active-tab');
            }
        }

        // Logic
        window.handleAuth = async (type) => {
            if(type === 'reg') {
                const name = document.getElementById('r-name').value;
                const mobile = document.getElementById('r-mobile').value;
                const pass = document.getElementById('r-pass').value;
                
                if(!name || mobile.length !== 10 || !pass) return alert("All fields are mandatory!");
                
                await set(ref(db, 'users/' + mobile), { name, mobile, pass, balance: 0, kyc: "Pending" });
                alert("Account Created! Now Login.");
                toggleAuth('login');
            } else {
                const mobile = document.getElementById('l-mobile').value;
                const pass = document.getElementById('l-pass').value;
                
                const snapshot = await get(child(ref(db), `users/${mobile}`));
                if (snapshot.exists() && snapshot.val().pass === pass) {
                    window.location.href = "user/dashboard.html";
                } else {
                    alert("Invalid Credentials!");
                }
            }
        }
    </script>
</body>
</html>
