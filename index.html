<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Indian Bishi | Premium Finance</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --secondary: #a855f7; --bg: #0f172a; --card: rgba(255, 255, 255, 0.08); }
        * { box-sizing: border-box; transition: all 0.3s ease; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #0f172a;
            background-image: radial-gradient(circle at 0% 0%, #1e1b4b 0%, transparent 50%), radial-gradient(circle at 100% 100%, #2e1065 0%, transparent 50%);
            min-height: 100vh; margin: 0; display: flex; justify-content: center; align-items: center; padding: 20px; color: white;
        }

        .auth-container { 
            background: var(--card); backdrop-filter: blur(25px); 
            border: 1px solid rgba(255,255,255,0.1); padding: 40px 25px;
            border-radius: 30px; width: 100%; max-width: 400px; text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Logo Styling */
        .logo-img { width: 80px; height: 80px; margin-bottom: 15px; border-radius: 20px; object-fit: cover; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        
        h1 { font-size: 26px; font-weight: 800; margin: 0; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: #94a3b8; font-size: 13px; margin-bottom: 25px; }

        .tabs { display: flex; background: rgba(0,0,0,0.3); border-radius: 15px; margin-bottom: 25px; padding: 5px; }
        .tab { flex: 1; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 13px; }
        .active-tab { background: var(--primary); color: white; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3); }

        .input-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 11px; font-weight: 700; color: #6366f1; margin-bottom: 6px; margin-left: 5px; text-transform: uppercase; letter-spacing: 1px; }
        input { 
            width: 100%; padding: 15px; background: rgba(0,0,0,0.2); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; 
            color: white; font-size: 15px; outline: none;
        }
        input:focus { border-color: var(--primary); background: rgba(0,0,0,0.3); }

        .btn { 
            width: 100%; padding: 16px; background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; border: none; border-radius: 15px; font-size: 15px; font-weight: 800;
            cursor: pointer; margin-top: 10px; box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }
        .btn:hover { transform: translateY(-2px); }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="auth-container">
        <img src="logo.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3135/3135715.png'" class="logo-img">
        
        <h1>Indian Bishi</h1>
        <p>Your Trusted Financial Partner</p>

        <div class="tabs">
            <div id="tab-login" class="tab active-tab" onclick="toggleAuth('login')">LOGIN</div>
            <div id="tab-reg" class="tab" onclick="toggleAuth('reg')">REGISTER</div>
        </div>

        <div id="form-login">
            <div class="input-group">
                <label>Mobile Number</label>
                <input type="tel" id="l-mobile" placeholder="10 Digit Mobile Number" maxlength="10">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="l-pass" placeholder="••••••••">
            </div>
            <button class="btn" onclick="handleAuth('login')">SECURE LOGIN</button>
        </div>

        <div id="form-reg" class="hidden">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="r-name" placeholder="Enter Your Full Name">
            </div>
            <div class="input-group">
                <label>Mobile Number</label>
                <input type="tel" id="r-mobile" placeholder="10 Digit Mobile Number" maxlength="10">
            </div>
            <div class="input-group">
                <label>Create Password</label>
                <input type="password" id="r-pass" placeholder="Create Strong Password">
            </div>
            <button class="btn" onclick="handleAuth('reg')">CREATE ACCOUNT</button>
        </div>
        
        <div style="margin-top:20px; font-size:11px; opacity:0.5;">Powered by Bishi Pro AIML</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBjKtNm0nLIXeKG7YRBrsIQah9G1mL-UQM",
            authDomain: "indianbishi-pro.firebaseapp.com",
            projectId: "indianbishi-pro",
            storageBucket: "indianbishi-pro.firebasestorage.app",
            messagingSenderId: "274772179441",
            appId: "1:274772179441:web:a0fac89f47c6bae6e52c50"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.toggleAuth = (type) => {
            if(type === 'login') {
                document.getElementById('form-login').classList.remove('hidden');
                document.getElementById('form-reg').classList.add('hidden');
                document.getElementById('tab-login').classList.add('active-tab');
                document.getElementById('tab-reg').classList.remove('active-tab');
            } else {
                document.getElementById('form-login').classList.add('hidden');
                document.getElementById('form-reg').classList.remove('hidden');
                document.getElementById('tab-reg').classList.add('active-tab');
                document.getElementById('tab-login').classList.remove('active-tab');
            }
        }

        window.handleAuth = async (type) => {
            if(type === 'reg') {
                const name = document.getElementById('r-name').value;
                const mobile = document.getElementById('r-mobile').value;
                const pass = document.getElementById('r-pass').value;
                
                if(!name || mobile.length !== 10 || !pass) {
                    alert("Please fill all details correctly with 10 digit number!");
                    return;
                }
                
                await set(ref(db, 'users/' + mobile), { 
                    name: name, 
                    mobile: mobile, 
                    pass: pass, 
                    balance: 0, 
                    kyc: "Pending",
                    regDate: new Date().toLocaleDateString()
                });
                
                alert("Account Created Successfully! Redirecting...");
                window.location.href = "user/dashboard.html";
            } else {
                const mobile = document.getElementById('l-mobile').value;
                const pass = document.getElementById('l-pass').value;
                
                if(mobile.length !== 10) return alert("Enter 10 digit mobile number!");

                const snapshot = await get(child(ref(db), `users/${mobile}`));
                if (snapshot.exists() && snapshot.val().pass === pass) {
                    window.location.href = "user/dashboard.html";
                } else {
                    alert("Invalid Number or Password!");
                }
            }
        }
    </script>
</body>
</html>
