<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>Indian Bishi | Welcome</title>
    <link href='https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap' rel='stylesheet'>
    <style>
        :root { --primary: #4318ff; --bg: #f4f7fe; --text: #2b3674; --grey: #a3aed1; }
        * { box-sizing: border-box; transition: all 0.3s ease; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .auth-card { background: white; padding: 40px 25px; border-radius: 32px; box-shadow: 0 20px 50px rgba(0,0,0,0.04); width: 100%; max-width: 400px; text-align: center; }
        .logo { background: linear-gradient(135deg, var(--primary), #b089ff); width: 64px; height: 64px; border-radius: 20px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; color: white; font-size: 28px; box-shadow: 0 10px 20px rgba(67, 24, 255, 0.2); }
        h1 { color: var(--text); font-size: 24px; font-weight: 800; margin-bottom: 8px; }
        p { color: var(--grey); font-size: 14px; margin-bottom: 30px; }
        input { width: 100%; padding: 16px; border: 2px solid #f4f7fe; border-radius: 16px; font-size: 16px; background: #f8fafc; outline: none; margin-bottom: 20px; font-weight: 600; }
        input:focus { border-color: var(--primary); background: #fff; }
        .btn { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 18px; cursor: pointer; font-size: 16px; font-weight: 700; box-shadow: 0 10px 20px rgba(67, 24, 255, 0.2); }
        .footer-link { margin-top: 25px; font-size: 14px; color: var(--grey); }
        .footer-link span { color: var(--primary); font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>
    <div class='auth-card'>
        <div class='logo'>🏛️</div>
        <h1>Welcome Back</h1>
        <p>Login to manage your bishi pools.</p>
        <input type='tel' placeholder='Mobile Number' maxlength='10'>
        <button class='btn' onclick='location.href="user/dashboard.html"'>Login</button>
        <div style='margin-top:20px; border-top:1px dashed #eee; padding-top:15px;'>
            <a href='admin/panel.html' style='color:#a3aed1; text-decoration:none; font-size:12px; font-weight:600;'>⚙️ Admin Access</a>
        </div>
    </div>
</body>
</html>
