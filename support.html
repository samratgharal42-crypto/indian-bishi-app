<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Support | Indian Bishi</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #e2e8f0; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .header { background: #0f172a; color: white; padding: 20px; font-size: 16px; font-weight: 800; display: flex; align-items: center; gap: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); z-index: 10; }
        
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 12px; font-size: 14px; font-weight: 600; line-height: 1.4; }
        
        .msg.admin { background: white; color: #1e293b; align-self: flex-start; border-bottom-left-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid #cbd5e1; }
        .msg.user { background: #6366f1; color: white; align-self: flex-end; border-bottom-right-radius: 4px; box-shadow: 0 4px 10px rgba(99,102,241,0.2); }
        
        .input-area { background: white; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #cbd5e1; }
        .input-area input { flex: 1; padding: 15px; border-radius: 25px; border: 1px solid #cbd5e1; outline: none; font-family: inherit; font-weight: 600; font-size: 14px; }
        .input-area button { background: #10b981; color: white; border: none; width: 50px; height: 50px; border-radius: 50%; font-weight: 800; font-size: 20px; cursor: pointer; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3); }
        .input-area button:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="header">
        <a href="user/profile.html" style="text-decoration:none; color:white; font-size:20px;">⬅</a>
        🎧 Indian Bishi Support
    </div>
    
    <div class="chat-box" id="chat-box">
        <div class="msg admin">Welcome! How can I help you today? Our Admin will reply shortly.</div>
    </div>

    <div class="input-area">
        <input type="text" id="msg-input" placeholder="Type your query here...">
        <button onclick="sendMsg()">➤</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        
        // Firebase Setup
        const app = initializeApp({ databaseURL: "https://indianbishi-pro-default-rtdb.firebaseio.com" });
        const db = getDatabase(app);
        const mobile = localStorage.getItem('activeUser');

        if(!mobile) window.location.href = "index.html";

        // Fetch messages from the NEW node (support_chats)
        onValue(ref(db, `support_chats/${mobile}`), snap => {
            const chat = document.getElementById('chat-box');
            chat.innerHTML = '<div class="msg admin">Welcome! How can I help you today? Our Admin will reply shortly.</div>';
            
            if(snap.exists()) {
                snap.forEach(c => {
                    const m = c.val();
                    const cls = m.sender === 'user' ? 'msg user' : 'msg admin';
                    chat.innerHTML += `<div class="${cls}">${m.text}</div>`;
                });
            }
            chat.scrollTop = chat.scrollHeight; // Auto scroll to latest message
        });

        // Send message to Admin
        window.sendMsg = () => {
            const inputField = document.getElementById('msg-input');
            const text = inputField.value.trim();
            
            if(!text) return;
            
            // Push to NEW node
            push(ref(db, `support_chats/${mobile}`), { 
                text: text, 
                sender: 'user', 
                timestamp: Date.now() 
            }).then(() => {
                inputField.value = ""; // Clear input box
            });
        };
    </script>
</body>
</html>
