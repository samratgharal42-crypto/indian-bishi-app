<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Support | Indian Bishi</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --text: #1e293b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; color: var(--text); padding-bottom: 100px; display: flex; flex-direction: column; min-height: 100vh;}
        
        .header-bar { display: flex; align-items: center; padding: 20px; background: white; border-bottom: 1px solid #f1f5f9; sticky: top; }
        .back-btn { text-decoration: none; color: var(--text); font-size: 24px; font-weight: 800; margin-right: 15px; }
        h2 { font-size: 19px; margin: 0; font-weight: 800; }

        /* CHAT WINDOW */
        .chat-container { flex-grow: 1; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        .msg { display: flex; flex-direction: column; max-width: 80%; }
        .msg.received { align-self: flex-start; }
        .msg.sent { align-self: flex-end; }

        .msg-bubble { padding: 15px; border-radius: 18px; font-size: 14px; font-weight: 600; line-height: 1.5; }
        .msg.received .msg-bubble { background: white; border: 1px solid #f1f5f9; color: var(--text); border-bottom-left-radius: 5px; }
        .msg.sent .msg-bubble { background: var(--primary); color: white; border-bottom-right-radius: 5px; }
        
        .msg-time { font-size: 10px; color: #94a3b8; margin-top: 5px; margin-left: 5px; font-weight: bold;}
        .msg.sent .msg-time { align-self: flex-end;}

        /* Bottom Navigation for Chat Only */
        .chat-input-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; height: 90px; display: flex; align-items: center; padding: 0 15px; box-shadow: 0 -10px 40px rgba(0,0,0,0.05); z-index: 999; border-top: 1px solid #f1f5f9; padding-bottom: 10px; }
        input[type="text"] { flex-grow: 1; padding: 18px; border-radius: 15px; border: 1.5px solid #e2e8f0; font-size: 15px; outline: none; margin-right: 10px; }
        input[type="text"]:focus { border-color: var(--primary); }
        .send-btn { width: 50px; height: 50px; background: var(--primary); color: white; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 20px; border: none; cursor: pointer; box-shadow: 0 5px 15px rgba(99, 102, 241, 0.3); }

    </style>
</head>
<body>

    <div class="header-bar">
        <a href="/indian-bishi-app/dashboard.html" class="back-btn">←</a>
        <h2>Support Live Chat 🎧</h2>
        <div style="margin-left: auto; width: 10px; height: 10px; background: #10b981; border-radius: 50%;" title="Admin Online"></div>
    </div>

    <div class="chat-container" id="chat-messages">
        <div class="msg received">
            <div class="msg-bubble">Welcome to Indian Bishi Support! How can I assist you today? Our Agent will reply within 5 mins.</div>
            <span class="msg-time">Just Now</span>
        </div>
    </div>

    <div class="chat-input-bar">
        <input type="text" id="chat-input" placeholder="Type your message here...">
        <button class="send-btn" onclick="sendMessage()">▶</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const app = initializeApp({ databaseURL: "https://indianbishi-pro-default-rtdb.firebaseio.com" });
        const db = getDatabase(app);
        const mobile = localStorage.getItem('activeUser');

        if(!mobile) {
            window.location.href = "/indian-bishi-app/index.html";
        } else {
            // Function to send message to Firebase
            window.sendMessage = () => {
                const input = document.getElementById('chat-input');
                const message = input.value;
                if(message.trim() === "") return;

                const chatRef = ref(db, `chats/${mobile}/messages`);
                const newMessageRef = push(chatRef);
                set(newMessageRef, {
                    text: message,
                    timestamp: Date.now(),
                    sender: "User"
                }).then(() => {
                    input.value = ""; // Clear input
                });
            }

            // Real-time Chat Lister
            const chatMessagesRef = ref(db, `chats/${mobile}/messages`);
            onValue(chatMessagesRef, (snapshot) => {
                const data = snapshot.val();
                const chatContainer = document.getElementById('chat-messages');
                // Retain welcome message
                chatContainer.innerHTML = `<div class="msg received"><div class="msg-bubble">Welcome! How can I help you today? Our Admin will reply shortly or AI Agent will assist.</div></div>`;

                if(data) {
                    for(const key in data) {
                        const msg = data[key];
                        const timeStr = new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                        const msgClass = msg.sender === "User" ? "sent" : "received";
                        
                        chatContainer.innerHTML += `
                            <div class="msg ${msgClass}">
                                <div class="msg-bubble">${msg.text}</div>
                                <span class="msg-time">${timeStr}</span>
                            </div>
                        `;
                    }
                    // Auto-scroll to bottom
                    window.scrollTo(0, document.body.scrollHeight);
                }
            });
        }
    </script>
</body>
</html>
