<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Bishi | Indian Bishi</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --text: #1e293b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; color: var(--text); padding-bottom: 90px; }

        .header { background: linear-gradient(135deg, #6366f1, #a855f7); padding: 30px 20px 40px; color: white; text-align: center; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; }
        .header h1 { margin: 0; font-size: 24px; font-weight: 800; }
        
        .content { padding: 20px; margin-top: -30px; }

        /* Empty State */
        .empty-state { background: white; border-radius: 20px; padding: 40px 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; }
        .empty-icon { font-size: 50px; margin-bottom: 15px; }
        .empty-title { font-size: 18px; font-weight: 800; color: #1e293b; margin-bottom: 5px; }
        .empty-desc { font-size: 13px; color: #64748b; margin-bottom: 25px; line-height: 1.5; }
        
        .explore-btn { display: inline-block; padding: 15px 30px; background: var(--primary); color: white; border-radius: 15px; font-weight: 800; text-decoration: none; font-size: 14px; box-shadow: 0 5px 15px rgba(99, 102, 241, 0.3); }

        /* Bottom Navigation */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; height: 75px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 -10px 30px rgba(0,0,0,0.05); border-top: 1px solid #f1f5f9; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 5px; text-decoration: none; color: #94a3b8; font-size: 10px; font-weight: 700; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 22px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>My Bishi 🎯</h1>
    </div>

    <div class="content">
        <div class="empty-state">
            <div class="empty-icon">📭</div>
            <div class="empty-title">No Active Bishi</div>
            <div class="empty-desc">You haven't joined any Bishi pool yet. Start saving today!</div>
            <a href="/indian-bishi-app/dashboard.html" class="explore-btn">EXPLORE POOLS</a>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="/indian-bishi-app/dashboard.html" class="nav-item">
            <span class="nav-icon">🏠</span><span>HOME</span>
        </a>
        <a href="/indian-bishi-app/bishi/all-pools.html" class="nav-item active">
            <span class="nav-icon">🎯</span><span>MY BISHI</span>
        </a>
        <a href="/indian-bishi-app/user/profile.html" class="nav-item">
            <span class="nav-icon">👤</span><span>ACCOUNT</span>
        </a>
    </nav>

</body>
</html>
