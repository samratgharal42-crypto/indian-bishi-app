<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>All Bishi Pools | Indian Bishi</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --text: #1e293b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 100px; }

        .header { background: white; padding: 20px; text-align: center; font-size: 18px; font-weight: 800; border-bottom: 1px solid #f1f5f9; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        
        .pools-container { padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        .pool-card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); border: 1px solid #f1f5f9; position: relative; overflow: hidden; }
        .pool-badge { position: absolute; top: 20px; right: 20px; background: #e0e7ff; color: var(--primary); padding: 5px 10px; border-radius: 8px; font-size: 11px; font-weight: 800; }
        
        .pool-title { font-size: 18px; font-weight: 800; color: #1e293b; margin-bottom: 5px; width: 70%; }
        .pool-amt { font-size: 24px; font-weight: 800; color: var(--primary); margin-bottom: 15px; }
        
        .pool-details { display: flex; justify-content: space-between; background: #f8fafc; padding: 12px; border-radius: 12px; margin-bottom: 15px; border: 1px dashed #cbd5e1; }
        .detail-box { text-align: center; flex: 1; border-right: 1px dashed #cbd5e1; }
        .detail-box:last-child { border-right: none; }
        .detail-label { font-size: 11px; color: #64748b; font-weight: 800; text-transform: uppercase; margin-bottom: 3px; }
        .detail-val { font-size: 14px; font-weight: 800; color: #1e293b; }

        .join-btn { width: 100%; background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; border: none; padding: 15px; border-radius: 14px; font-weight: 800; font-size: 15px; cursor: pointer; box-shadow: 0 10px 20px rgba(99,102,241,0.2); }

        /* BOTTOM NAV (LOCKED) */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; height: 80px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 -10px 30px rgba(0,0,0,0.05); z-index: 9999; border-top: 1px solid #f1f5f9; }
        .nav-item { text-decoration: none; color: #94a3b8; font-size: 10px; font-weight: 800; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 33.33%; height: 100%; gap: 5px; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 24px !important; width: 24px !important; height: 24px !important; line-height: 24px !important; display: flex !important; align-items: center !important; justify-content: center !important; }
    </style>
</head>
<body>

    <div class="header">🎯 Available Bishi Pools</div>

    <div class="pools-container" id="live-pools">
        <p style="text-align:center; color:#94a3b8; font-weight:600; margin-top: 50px;">Fetching live pools...</p>
    </div>

    <nav class="bottom-nav">
        <a href="/indian-bishi-app/dashboard.html" class="nav-item"><span class="nav-icon">🏠</span><span>HOME</span></a>
        <a href="/indian-bishi-app/bishi/all-pools.html" class="nav-item active"><span class="nav-icon">🎯</span><span>MY BISHI</span></a>
        <a href="/indian-bishi-app/user/profile.html" class="nav-item"><span class="nav-icon">👤</span><span>ACCOUNT</span></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const app = initializeApp({ databaseURL: "https://indianbishi-pro-default-rtdb.firebaseio.com" });
        const db = getDatabase(app);

        // Fetch pools from Firebase
        onValue(ref(db, 'pools'), (snapshot) => {
            const container = document.getElementById('live-pools');
            container.innerHTML = "";

            if(!snapshot.exists()) {
                container.innerHTML = '<p style="text-align:center; color:#94a3b8; font-weight:600; margin-top: 50px;">No active pools right now. Please check back later!</p>';
                return;
            }

            snapshot.forEach((childSnapshot) => {
                const data = childSnapshot.val();
                
                // HTML for each pool
                const poolCard = `
                    <div class="pool-card">
                        <div class="pool-badge">${data.status}</div>
                        <div class="pool-title">${data.name}</div>
                        <div class="pool-amt">₹${data.amount.toLocaleString('en-IN')}</div>
                        
                        <div class="pool-details">
                            <div class="detail-box">
                                <div class="detail-label">EMI</div>
                                <div class="detail-val">₹${data.emi}/mo</div>
                            </div>
                            <div class="detail-box">
                                <div class="detail-label">Months</div>
                                <div class="detail-val">${data.months}</div>
                            </div>
                            <div class="detail-box">
                                <div class="detail-label">Members</div>
                                <div class="detail-val">${data.joined}/${data.maxMembers}</div>
                            </div>
                        </div>

                        <button class="join-btn" onclick="alert('Payment Gateway Integration in Progress!')">Join Pool Now 🚀</button>
                    </div>
                `;
                container.innerHTML += poolCard;
            });
        });
    </script>
</body>
</html>
