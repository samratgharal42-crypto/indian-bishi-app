<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Active Bishi | Indian Bishi</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --text: #1e293b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 100px; }

        .header { background: white; padding: 20px; text-align: center; font-size: 18px; font-weight: 800; border-bottom: 1px solid #f1f5f9; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        
        .container { padding: 20px; }

        /* PERFECT CARD DESIGN */
        .pool-card-new { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); margin-bottom: 15px; border: 1px solid #f1f5f9; }
        .p-head { display: flex; justify-content: space-between; align-items: center; }
        .p-title { font-size: 18px; font-weight: 800; color: #1e293b; text-transform: uppercase; }
        .p-badge-active { background: #d1fae5; color: #059669; padding: 5px 12px; border-radius: 10px; font-size: 12px; font-weight: 800; }
        .p-amt { font-size: 32px; font-weight: 800; color: #6366f1; margin: 5px 0 15px; }
        
        .p-stats { display: flex; justify-content: space-between; background: white; border: 1px dashed #cbd5e1; border-radius: 12px; padding: 15px 10px; margin-bottom: 15px; }
        .stat-box { text-align: center; flex: 1; border-right: 1px dashed #cbd5e1; }
        .stat-box:last-child { border-right: none; }
        .s-label { font-size: 10px; color: #64748b; font-weight: 800; margin-bottom: 5px; text-transform: uppercase; }
        .s-val { font-size: 14px; font-weight: 800; color: #1e293b; }
        
        .btn-active-status { background: #f0fdf4; color: #059669; border: 1px solid #bbf7d0; width: 100%; padding: 15px; border-radius: 12px; font-size: 15px; font-weight: 800; display: block; text-align: center; }

        .empty-state { text-align: center; padding: 50px 20px; color: #64748b; font-weight: 600; line-height: 1.6; }
        .btn-home { display: inline-block; background: var(--primary); color: white; padding: 12px 24px; border-radius: 12px; text-decoration: none; margin-top: 15px; font-weight: 800; }

        /* BOTTOM NAV */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; height: 80px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 -10px 30px rgba(0,0,0,0.05); z-index: 9999; border-top: 1px solid #f1f5f9; }
        .nav-item { text-decoration: none; color: #94a3b8; font-size: 10px; font-weight: 800; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 33.33%; height: 100%; gap: 5px; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 24px !important; }
    </style>
</head>
<body>

    <div class="header">🎯 My Active Bishi</div>

    <div class="container" id="my-pools">
        <p style="text-align:center; color:#94a3b8; font-weight:600; margin-top: 50px;">Loading your joined pools...</p>
    </div>

    <nav class="bottom-nav">
        <a href="/indian-bishi-app/dashboard.html" class="nav-item"><span class="nav-icon">🏠</span><span>HOME</span></a>
        <a href="/indian-bishi-app/bishi/all-pools.html" class="nav-item active"><span class="nav-icon">🎯</span><span>MY BISHI</span></a>
        <a href="/indian-bishi-app/user/profile.html" class="nav-item"><span class="nav-icon">👤</span><span>ACCOUNT</span></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const app = initializeApp({ databaseURL: "https://indianbishi-pro-default-rtdb.firebaseio.com" });
        const db = getDatabase(app);
        const mobile = localStorage.getItem('activeUser');

        if(!mobile) window.location.href = "../index.html";

        onValue(ref(db, `users/${mobile}/joined_pools`), (joinedSnap) => {
            const container = document.getElementById('my-pools');
            
            if(!joinedSnap.exists()) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size:40px; margin-bottom:10px;">📭</div>
                        You haven't joined any Bishi Pools yet.<br>Go to Home page to explore and join!
                        <br><a href="../dashboard.html" class="btn-home">Explore Pools</a>
                    </div>`;
                return;
            }

            const joinedPoolsData = joinedSnap.val(); 

            onValue(ref(db, 'pools'), (allPoolsSnap) => {
                container.innerHTML = "";
                let hasPools = false;

                allPoolsSnap.forEach((child) => {
                    if(joinedPoolsData[child.key]) { 
                        hasPools = true;
                        const data = child.val();
                        container.innerHTML += `
                            <div class="pool-card-new">
                                <div class="p-head">
                                    <div class="p-title">${data.name}</div>
                                    <div class="p-badge-active">Active</div>
                                </div>
                                <div class="p-amt">₹${data.amount.toLocaleString('en-IN')}</div>
                                
                                <div class="p-stats">
                                    <div class="stat-box">
                                        <div class="s-label">EMI</div>
                                        <div class="s-val">₹${data.emi}/mo</div>
                                    </div>
                                    <div class="stat-box">
                                        <div class="s-label">MONTHS</div>
                                        <div class="s-val">${data.months}</div>
                                    </div>
                                    <div class="stat-box">
                                        <div class="s-label">PAID HAPTE</div>
                                        <div class="s-val">1 / ${data.months}</div>
                                    </div>
                                </div>

                                <div class="btn-active-status">🟢 You are an active member</div>
                            </div>
                        `;
                    }
                });

                if(!hasPools) {
                    container.innerHTML = "<p style='text-align:center;'>No active pools found.</p>";
                }
            });
        });
    </script>
</body>
</html>
