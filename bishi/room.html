<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bidding Room | Indian Bishi</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; }
        .header { background: #0f172a; color: white; padding: 20px; text-align: center; }
        .win-amt { font-size: 30px; font-weight: 800; color: #10b981; margin: 10px 0; }
        
        .chat-box { flex: 1; overflow-y: auto; padding: 20px; background: white; display: flex; flex-direction: column; gap: 10px; }
        .bid-msg { background: #f1f5f9; padding: 12px 15px; border-radius: 12px; font-size: 14px; font-weight: 800; color: #1e293b; align-self: flex-start; border-left: 4px solid #6366f1; }
        .my-bid { align-self: flex-end; background: #e0e7ff; border-left: none; border-right: 4px solid #4f46e5; }
        .time { font-size: 10px; color: #94a3b8; font-weight: 600; display: block; margin-top: 4px; }

        .action-area { background: white; padding: 20px; border-top: 1px solid #e2e8f0; box-shadow: 0 -10px 20px rgba(0,0,0,0.05); }
        .bid-buttons { display: flex; gap: 10px; }
        .btn-bid { flex: 1; background: #6366f1; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 800; font-size: 15px; cursor: pointer; }
        .btn-bid:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0; font-size:16px;">LIVE BIDDING ROOM 🔴</h2>
        <div class="win-amt">Current Lowest: ₹<span id="current-lowest">---</span></div>
        <div style="font-size:12px; color:#cbd5e1;">Bidding closes at 12:00 AM Midnight</div>
    </div>

    <div class="chat-box" id="chat-history">
        <p style="text-align:center; color:#94a3b8; font-size:12px;">Waiting for first bid...</p>
    </div>

    <div class="action-area" id="action-area">
        <div style="font-size:12px; font-weight:800; color:#64748b; margin-bottom:10px;">Select an amount lower than current:</div>
        <div class="bid-buttons">
            <button class="btn-bid" id="btn-1" onclick="placeBid(10)">-₹10</button>
            <button class="btn-bid" id="btn-2" onclick="placeBid(50)">-₹50</button>
            <button class="btn-bid" id="btn-3" onclick="placeBid(100)">-₹100</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, get, child, push, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const app = initializeApp({ databaseURL: "https://indianbishi-pro-default-rtdb.firebaseio.com" });
        const db = getDatabase(app);
        const mobile = localStorage.getItem('activeUser');
        const poolId = new URLSearchParams(window.location.search).get('id');

        let currentLowest = 0;
        let poolWinAmount = 0;
        const mySecretId = "Member-" + mobile.slice(-4); // Hidden identity

        // Get Base Win Amount
        get(child(ref(db), `pools/${poolId}`)).then(snap => {
            if(snap.exists()) {
                poolWinAmount = parseInt(snap.val().winAmount);
                currentLowest = poolWinAmount;
                document.getElementById('current-lowest').innerText = currentLowest;
            }
        });

        // Listen for Real-Time Bids
        onValue(ref(db, `bids/${poolId}`), snap => {
            const chat = document.getElementById('chat-history');
            if(snap.exists()) {
                chat.innerHTML = "";
                let lowest = poolWinAmount;
                snap.forEach(c => {
                    const d = c.val();
                    if(d.amount < lowest) lowest = d.amount;
                    
                    const isMe = d.user === mobile;
                    const nameToShow = isMe ? "You" : d.hiddenId;
                    const cssClass = isMe ? "bid-msg my-bid" : "bid-msg";

                    chat.innerHTML += `
                        <div class="${cssClass}">
                            ${nameToShow} asked for ₹${d.amount}
                            <span class="time">${d.time}</span>
                        </div>
                    `;
                });
                currentLowest = lowest;
                document.getElementById('current-lowest').innerText = currentLowest;
                chat.scrollTop = chat.scrollHeight; // Auto scroll to bottom
            }
        });

        window.placeBid = (discount) => {
            const newBid = currentLowest - discount;
            if(newBid < (poolWinAmount * 0.5)) return alert("Bid cannot go below 50% of win amount!"); // Rule
            
            const timeStr = new Date().toLocaleTimeString('en-IN', {hour: '2-digit', minute:'2-digit'});
            push(ref(db, `bids/${poolId}`), {
                user: mobile, hiddenId: mySecretId, amount: newBid, time: timeStr, timestamp: Date.now()
            });
        };

        // 🚨 Midnight Bot Simulator (Checks every minute) 🚨
        setInterval(() => {
            const now = new Date();
            if(now.getHours() === 0 && now.getMinutes() === 0) {
                document.getElementById('action-area').innerHTML = "<h3 style='color:red; text-align:center;'>Bidding Closed! Checking Winner...</h3>";
                
                // Fetch lowest bid and push to Admin Withdrawals
                get(child(ref(db), `bids/${poolId}`)).then(snap => {
                    let winner = null; let lowestAmt = 9999999;
                    snap.forEach(c => {
                        if(c.val().amount < lowestAmt) { lowestAmt = c.val().amount; winner = c.val().user; }
                    });
                    
                    if(winner && winner === mobile) {
                        alert("🎉 CONGRATULATIONS! You won the Bishi for ₹" + lowestAmt);
                        // Send to Admin Withdrawals
                        push(ref(db, 'withdrawals'), { poolId: poolId, winnerMobile: winner, amount: lowestAmt, date: new Date().toLocaleDateString('en-IN'), status: "Pending Payout" });
                    }
                });
            }
        }, 60000);
    </script>
</body>
</html>
