<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Bidding | Indian Bishi</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; }
        .header { background: #0f172a; color: white; padding: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); z-index: 10; }
        .win-amt { font-size: 32px; font-weight: 800; color: #10b981; margin: 10px 0; }
        
        /* ADVANCED WINNER BANNER */
        .winner-banner { display: none; background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #fff; padding: 12px 15px; text-align: center; font-size: 13px; font-weight: 800; border-radius: 12px; margin: 15px 20px 5px; box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4); animation: slideDown 0.5s ease-out; }
        @keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .chat-box { flex: 1; overflow-y: auto; padding: 15px 20px; display: flex; flex-direction: column; gap: 12px; }
        .bid-msg { background: white; padding: 12px 15px; border-radius: 12px; font-size: 14px; font-weight: 800; color: #1e293b; align-self: flex-start; border-left: 4px solid #6366f1; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .my-bid { align-self: flex-end; background: #e0e7ff; border-left: none; border-right: 4px solid #4f46e5; }
        .time { font-size: 10px; color: #94a3b8; font-weight: 600; display: block; margin-top: 5px; }

        .action-area { background: white; padding: 20px; border-top: 1px solid #e2e8f0; box-shadow: 0 -10px 20px rgba(0,0,0,0.05); }
        .bid-buttons { display: flex; gap: 10px; }
        .btn-bid { flex: 1; background: #6366f1; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 800; font-size: 16px; cursor: pointer; box-shadow: 0 4px 10px rgba(99,102,241,0.2); transition: 0.2s; }
        .btn-bid:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="header">
        <a href="all-pools.html" style="color:white; float:left; text-decoration:none; font-size:20px;">⬅</a>
        <h2 style="margin:0; font-size:14px; text-transform:uppercase; letter-spacing:1px;">Live Bidding Room 🔴</h2>
        <div class="win-amt">Current Lowest:<br>₹<span id="current-lowest">---</span></div>
        <div style="font-size:12px; color:#cbd5e1;">Bidding closes at 12:00 AM Midnight</div>
    </div>

    <div class="winner-banner" id="winner-banner">
        <span id="winner-text"></span>
    </div>

    <div class="chat-box" id="chat-history">
        <p style="text-align:center; color:#94a3b8; font-size:12px; font-weight:600;">Waiting for the first bid...</p>
    </div>

    <div class="action-area" id="action-area">
        <div style="font-size:12px; font-weight:800; color:#64748b; margin-bottom:10px;">Select an amount lower than current:</div>
        <div class="bid-buttons">
            <button class="btn-bid" onclick="placeBid(10)">-₹10</button>
            <button class="btn-bid" onclick="placeBid(50)">-₹50</button>
            <button class="btn-bid" onclick="placeBid(100)">-₹100</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, get, child, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const app = initializeApp({ databaseURL: "https://indianbishi-pro-default-rtdb.firebaseio.com" });
        const db = getDatabase(app);
        const mobile = localStorage.getItem('activeUser');
        const poolId = new URLSearchParams(window.location.search).get('id');

        let currentLowest = 0;
        let poolWinAmount = 0;
        const mySecretId = "Member-" + mobile.slice(-4); 

        // 🚨 WINNER BANNER & POOL INFO 🚨
        get(child(ref(db), `pools/${poolId}`)).then(snap => {
            if(snap.exists()) {
                const pData = snap.val();
                poolWinAmount = parseInt(pData.winAmount);
                currentLowest = poolWinAmount;
                document.getElementById('current-lowest').innerText = currentLowest;

                // Show Latest Winner if exists
                if(pData.latest_winner) {
                    const lw = pData.latest_winner;
                    document.getElementById('winner-banner').style.display = 'block';
                    document.getElementById('winner-text').innerHTML = `🏆 <b>Latest Winner:</b> +91 ${lw.mobile.substring(0,6)}XXXX won <b>₹${lw.amount}</b> on ${lw.date}`;
                }

                // Check if user already won
                if(pData.past_winners && pData.past_winners[mobile]) {
                    document.getElementById('action-area').innerHTML = `
                        <div style='background:#fef2f2; color:#ef4444; padding:15px; border-radius:12px; text-align:center; font-weight:800; border:1px solid #fecaca;'>
                            🏆 You have already won this Bishi!<br><span style='font-size:11px; color:#b91c1c; font-weight:600;'>You cannot bid again until the new cycle starts.</span>
                        </div>`;
                }
            }
        });

        onValue(ref(db, `bids/${poolId}`), snap => {
            const chat = document.getElementById('chat-history');
            if(snap.exists()) {
                chat.innerHTML = "";
                let lowest = poolWinAmount; 
                
                snap.forEach(c => {
                    const d = c.val();
                    const bidAmt = parseInt(d.amount);
                    if(bidAmt < lowest) { lowest = bidAmt; }
                    
                    const isMe = d.user === mobile;
                    const nameToShow = isMe ? "You" : d.hiddenId;
                    const cssClass = isMe ? "bid-msg my-bid" : "bid-msg";

                    chat.innerHTML += `
                        <div class="${cssClass}">
                            ${nameToShow} asked for <b>₹${bidAmt}</b>
                            <span class="time">${d.time}</span>
                        </div>`;
                });
                
                currentLowest = lowest; 
                document.getElementById('current-lowest').innerText = currentLowest;
                chat.scrollTop = chat.scrollHeight; 
            }
        });

        window.placeBid = (discount) => {
            const newBid = parseInt(currentLowest) - parseInt(discount);
            if(newBid < (poolWinAmount * 0.5)) return alert("Bid cannot go below 50% of win amount!"); 
            
            const timeStr = new Date().toLocaleTimeString('en-IN', {hour: '2-digit', minute:'2-digit'});
            push(ref(db, `bids/${poolId}`), {
                user: mobile, hiddenId: mySecretId, amount: newBid, time: timeStr, timestamp: Date.now()
            });
        };
    </script>
</body>
</html>
