<!DOCTYPE html>
<html lang="en">
<head>
    <title>Admin Support | Indian Bishi</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; padding: 15px; margin: 0; }
        .thread-card { background: white; padding: 15px; border-radius: 16px; border: 1px solid #cbd5e1; margin-bottom: 20px; }
        .chat-area { max-height: 200px; overflow-y: auto; background: #f8fafc; padding: 10px; margin: 10px 0; border-radius: 8px; border: 1px inset #e2e8f0; display: flex; flex-direction: column; gap: 8px; }
        .m-user { align-self: flex-start; background: #e0e7ff; color: #3730a3; padding: 8px; border-radius: 8px; font-size: 13px; max-width: 80%; font-weight: 600; }
        .m-admin { align-self: flex-end; background: #d1fae5; color: #065f46; padding: 8px; border-radius: 8px; font-size: 13px; max-width: 80%; font-weight: 600; }
        .reply-box { display: flex; gap: 8px; }
        .reply-box input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; font-family: inherit; font-weight: 600; }
        .reply-box button { background: #10b981; color: white; border: none; padding: 0 15px; border-radius: 8px; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>
    <a href="index.html" style="text-decoration:none; font-weight:800; color:#1e293b;">⬅ Back</a>
    <h2 style="margin-top:10px;">🎧 Live Support Chats</h2>
    <div id="threads-container">Loading chats...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        
        const app = initializeApp({ databaseURL: "https://indianbishi-pro-default-rtdb.firebaseio.com" });
        const db = getDatabase(app);

        // Fetching from EXACT SAME NODE: support_chats
        onValue(ref(db, 'support_chats'), snap => {
            const container = document.getElementById('threads-container'); 
            container.innerHTML = "";
            let hasChats = false;

            snap.forEach(userThread => {
                hasChats = true;
                const mob = userThread.key;
                let msgsHTML = "";
                
                userThread.forEach(msg => {
                    const m = msg.val();
                    const cls = m.sender === 'user' ? 'm-user' : 'm-admin';
                    const prefix = m.sender === 'user' ? 'User:' : 'You:';
                    msgsHTML += `<div class="${cls}"><b>${prefix}</b> ${m.text}</div>`;
                });

                container.innerHTML += `
                    <div class="thread-card">
                        <b style="color:#6366f1;">📞 +91 ${mob}</b>
                        <div class="chat-area" id="chat-${mob}">${msgsHTML}</div>
                        <div class="reply-box">
                            <input type="text" id="rep-${mob}" placeholder="Reply to ${mob}...">
                            <button onclick="sendRep('${mob}')">Send</button>
                        </div>
                    </div>`;
                
                setTimeout(() => {
                    let chatArea = document.getElementById(`chat-${mob}`);
                    if(chatArea) chatArea.scrollTop = chatArea.scrollHeight;
                }, 100);
            });
            if(!hasChats) container.innerHTML = "<p style='color:#64748b; font-size:13px;'>No active chats.</p>";
        });

        window.sendRep = mob => {
            const txt = document.getElementById('rep-' + mob).value.trim();
            if(!txt) return;
            push(ref(db, `support_chats/${mob}`), { text: txt, sender: 'admin', timestamp: Date.now() });
            document.getElementById('rep-' + mob).value = "";
        };
    </script>
</body>
</html>
