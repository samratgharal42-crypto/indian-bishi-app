<!DOCTYPE html>
<html lang="en">
<head>
    <title>Support Chat | Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; padding: 15px; margin: 0; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-back { background: white; padding: 10px 15px; border-radius: 10px; text-decoration: none; color: #1e293b; font-weight: 800; border: 1px solid #e2e8f0; }
        
        .thread-card { background: white; padding: 15px; border-radius: 16px; border: 1px solid #cbd5e1; margin-bottom: 20px; }
        .user-title { font-size: 16px; font-weight: 800; color: #6366f1; margin-bottom: 10px; border-bottom: 1px solid #f1f5f9; padding-bottom: 5px;}
        
        .chat-area { max-height: 250px; overflow-y: auto; background: #f8fafc; padding: 10px; border-radius: 8px; border: 1px inset #e2e8f0; display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
        
        .msg { padding: 8px 12px; border-radius: 8px; font-size: 13px; max-width: 85%; font-weight: 600; line-height: 1.4; }
        .m-user { align-self: flex-start; background: #e0e7ff; color: #3730a3; }
        .m-admin { align-self: flex-end; background: #d1fae5; color: #065f46; }
        
        .reply-box { display: flex; gap: 10px; }
        .reply-box input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; outline: none; font-family: inherit; font-weight: 600; }
        .reply-box button { background: #10b981; color: white; border: none; padding: 0 15px; border-radius: 8px; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="btn-back">⬅ Back</a>
        <h2 style="margin:0; font-size:18px;">🎧 Live User Chats</h2>
    </div>

    <div id="threads-container"><p style="text-align:center; color:#64748b;">Loading chats...</p></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const app = initializeApp({ databaseURL: "https://indianbishi-pro-default-rtdb.firebaseio.com" });
        const db = getDatabase(app);

        onValue(ref(db, 'support_chats'), snap => {
            const container = document.getElementById('threads-container'); 
            container.innerHTML = "";
            let hasChats = false;

            snap.forEach(userThread => {
                hasChats = true;
                const mobileNum = userThread.key;
                let msgsHTML = "";
                
                userThread.forEach(msgNode => {
                    const m = msgNode.val();
                    if(m.sender === 'user') {
                        msgsHTML += `<div class="msg m-user"><b>User:</b> ${m.text}</div>`;
                    } else {
                        msgsHTML += `<div class="msg m-admin"><b>You:</b> ${m.text}</div>`;
                    }
                });

                container.innerHTML += `
                    <div class="thread-card">
                        <div class="user-title">📞 +91 ${mobileNum}</div>
                        <div class="chat-area" id="chat-${mobileNum}">${msgsHTML}</div>
                        <div class="reply-box">
                            <input type="text" id="rep-${mobileNum}" placeholder="Reply to ${mobileNum}...">
                            <button onclick="sendRep('${mobileNum}')">Send</button>
                        </div>
                    </div>`;
                    
                setTimeout(() => {
                    let chatArea = document.getElementById(`chat-${mobileNum}`);
                    if(chatArea) chatArea.scrollTop = chatArea.scrollHeight;
                }, 100);
            });

            if(!hasChats) container.innerHTML = "<p style='text-align:center; color:#64748b;'>No messages yet.</p>";
        });

        window.sendRep = (mob) => {
            const inputField = document.getElementById('rep-' + mob);
            const txt = inputField.value.trim();
            if(!txt) return alert("Please type a message!");
            
            push(ref(db, `support_chats/${mob}`), { text: txt, sender: 'admin', timestamp: Date.now() })
            .then(() => { inputField.value = ""; });
        };
    </script>
</body>
</html>
