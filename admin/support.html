<!DOCTYPE html>
<html lang="en">
<head>
    <title>Admin Support | Indian Bishi</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; padding: 15px; margin: 0; }
        .thread-card { background: white; padding: 15px; border-radius: 16px; border: 1px solid #cbd5e1; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .chat-area { max-height: 250px; overflow-y: auto; background: #f8fafc; padding: 10px; margin: 10px 0; border-radius: 8px; border: 1px inset #e2e8f0; display: flex; flex-direction: column; gap: 8px; }
        .m-user { align-self: flex-start; background: #e0e7ff; color: #3730a3; padding: 8px 12px; border-radius: 8px; font-size: 13px; max-width: 80%; font-weight: 600; }
        .m-admin { align-self: flex-end; background: #d1fae5; color: #065f46; padding: 8px 12px; border-radius: 8px; font-size: 13px; max-width: 80%; font-weight: 600; }
        .reply-box { display: flex; gap: 8px; }
        .reply-box input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #cbd5e1; font-family: inherit; font-weight: 600; outline: none; }
        .reply-box button { background: #10b981; color: white; border: none; padding: 0 20px; border-radius: 8px; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>
    <a href="index.html" style="text-decoration:none; font-weight:800; color:#1e293b;">⬅ Back</a>
    <h2 style="margin-top:10px;">🎧 Live Support Chats</h2>
    <div id="threads-container"><p style="color:#64748b; text-align:center;">Loading fresh chats...</p></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        
        const app = initializeApp({ databaseURL: "https://indianbishi-pro-default-rtdb.firebaseio.com" });
        const db = getDatabase(app);

        // 🚨 READING FROM FRESH NODE: bishi_support_live 🚨
        onValue(ref(db, 'bishi_support_live'), snap => {
            const container = document.getElementById('threads-container'); 
            container.innerHTML = "";
            let hasChats = false;

            if(snap.exists()) {
                snap.forEach(userThread => {
                    hasChats = true;
                    const mob = userThread.key;
                    let msgsHTML = "";
                    
                    userThread.forEach(msg => {
                        const m = msg.val();
                        // Fallback check if m.text is undefined
                        const text = m.text || "No text"; 
                        const cls = m.sender === 'user' ? 'm-user' : 'm-admin';
                        const prefix = m.sender === 'user' ? 'User:' : 'You:';
                        msgsHTML += `<div class="${cls}"><b>${prefix}</b> ${text}</div>`;
                    });

                    container.innerHTML += `
                        <div class="thread-card">
                            <b style="color:#6366f1; font-size:16px;">📞 +91 ${mob}</b>
                            <div class="chat-area" id="chat-${mob}">${msgsHTML}</div>
                            <div class="reply-box">
                                <input type="text" id="rep-${mob}" placeholder="Reply to ${mob}...">
                                <button onclick="sendRep('${mob}')">Send</button>
                            </div>
                        </div>`;
                    
                    setTimeout(() => {
                        let chatArea = document.getElementById(`chat-${mob}`);
                        if(chatArea) chatArea.scrollTop = chatArea.scrollHeight;
                    }, 100);
                });
            }

            if(!hasChats) {
                container.innerHTML = `
                <div style="text-align:center; padding:30px; background:white; border-radius:12px; border:1px dashed #cbd5e1;">
                    <h1 style="margin:0;">📭</h1>
                    <p style="color:#64748b; font-weight:800;">No messages yet.</p>
                </div>`;
            }
        });

        window.sendRep = mob => {
            const inputField = document.getElementById('rep-' + mob);
            const txt = inputField.value.trim();
            if(!txt) return;
            
            push(ref(db, `bishi_support_live/${mob}`), { 
                text: txt, 
                sender: 'admin', 
                timestamp: Date.now() 
            }).then(() => {
                inputField.value = "";
            });
        };
    </script>
</body>
</html>
