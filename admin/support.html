<!DOCTYPE html>
<html lang="en">
<head>
    <title>Support | Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; padding: 15px; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #cbd5e1; }
        input { width: 65%; padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; }
        button { width: 30%; padding: 10px; border-radius: 8px; background: #10b981; color: white; font-weight: 800; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <a href="index.html" style="text-decoration:none; font-weight:800; color:#1e293b;">⬅ Back</a>
    <h2>🎧 User Queries</h2>
    <div id="list">Loading...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        const db = getDatabase(initializeApp({ databaseURL: "https://indianbishi-pro-default-rtdb.firebaseio.com" }));

        onValue(ref(db, 'support'), snap => {
            const list = document.getElementById('list'); list.innerHTML = "";
            let hasData = false;
            snap.forEach(c => {
                hasData = true;
                const d = c.val();
                let replyHTML = d.reply ? `<div style="background:#d1fae5; color:#065f46; padding:8px; border-radius:6px; margin-top:8px; font-size:12px;"><b>You:</b> ${d.reply}</div>` : 
                `<div style="margin-top:10px;"><input type="text" id="rep-${c.key}" placeholder="Type reply..."><button onclick="sendRep('${c.key}')">Reply</button></div>`;
                
                list.innerHTML += `
                    <div class="card">
                        <b style="color:#6366f1;">+91 ${d.userMobile}</b><br>
                        <span style="font-weight:800; font-size:15px;">${d.message}</span>
                        ${replyHTML}
                    </div>`;
            });
            if(!hasData) list.innerHTML = "No messages yet.";
        });

        window.sendRep = id => {
            const txt = document.getElementById('rep-' + id).value;
            if(txt) update(ref(db, 'support/' + id), { reply: txt, status: "Answered" }).then(() => alert("Reply Sent!"));
        };
    </script>
</body>
</html>
