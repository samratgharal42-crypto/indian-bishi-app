<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Chat | Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; margin: 0; padding: 15px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-back { background: white; padding: 10px 15px; border-radius: 10px; text-decoration: none; color: #1e293b; font-weight: 800; border: 1px solid #e2e8f0; }
        
        .chat-card { background: white; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 15px; }
        .user-num { font-size: 14px; font-weight: 800; color: #6366f1; margin-bottom: 10px; border-bottom: 1px solid #f1f5f9; padding-bottom: 5px; }
        .msg-bubble { background: #f8fafc; padding: 10px 12px; border-radius: 8px; font-size: 13px; color: #1e293b; margin-bottom: 10px; border-left: 3px solid #cbd5e1; }
        .reply-bubble { background: #d1fae5; padding: 10px 12px; border-radius: 8px; font-size: 13px; color: #065f46; margin-bottom: 10px; border-left: 3px solid #10b981; margin-left: 20px; }
        
        .reply-box { display: flex; gap: 8px; margin-top: 10px; }
        .reply-box input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; outline: none; font-family: 'Plus Jakarta Sans'; font-size: 13px; }
        .reply-box button { background: #10b981; color: white; border: none; padding: 0 15px; border-radius: 8px; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="btn-back">⬅ Back</a>
        <h2 style="margin:0; font-size:18px;">🎧 User Support</h2>
    </div>

    <div id="chats-container"><p style="text-align:center; color:#64748b;">Loading chats...</p></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const app = initializeApp({ databaseURL: "https://indianbishi-pro-default-rtdb.firebaseio.com" });
        const db = getDatabase(app);

        onValue(ref(db, 'support'), snap => {
            const container = document.getElementById('chats-container');
            container.innerHTML = "";
            if(!snap.exists()) {
                container.innerHTML = "<p style='text-align:center; color:#64748b;'>No messages yet.</p>"; return;
            }

            snap.forEach(c => {
                const msgId = c.key;
                const d = c.val();
                
                let replySection = "";
                if(d.reply) {
                    replySection = `<div class="reply-bubble"><b>Admin:</b> ${d.reply}</div>`;
                } else {
                    replySection = `
                        <div class="reply-box">
                            <input type="text" id="reply-${msgId}" placeholder="Type reply...">
                            <button onclick="sendReply('${msgId}')">Send</button>
                        </div>`;
                }

                container.innerHTML += `
                    <div class="chat-card">
                        <div class="user-num">👤 +91 ${d.userMobile}</div>
                        <div class="msg-bubble"><b>User:</b> ${d.message}</div>
                        ${replySection}
                    </div>
                `;
            });
        });

        window.sendReply = (msgId) => {
            const replyText = document.getElementById(`reply-${msgId}`).value;
            if(!replyText) return alert("Please type a reply!");
            
            update(ref(db, 'support/' + msgId), { reply: replyText, status: "Answered" })
            .then(() => alert("✅ Reply sent to user!"));
        };
    </script>
</body>
</html>
