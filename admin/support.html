<!DOCTYPE html>
<html lang="en">
<head>
    <title>Support Chat | Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; padding: 15px; margin: 0; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #cbd5e1; }
        .reply-box { display: flex; gap: 8px; margin-top: 10px; }
        .reply-box input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; outline: none; font-weight: 600; font-family: inherit; }
        .reply-box button { background: #10b981; color: white; border: none; padding: 0 15px; border-radius: 8px; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>
    <a href="index.html" style="text-decoration:none; font-weight:800; color:#1e293b;">⬅ Back</a>
    <h2 style="margin-top:10px;">🎧 User Queries</h2>
    <div id="list"><p style="color:#64748b; font-size:12px;">Loading messages...</p></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        const db = getDatabase(initializeApp({ databaseURL: "https://indianbishi-pro-default-rtdb.firebaseio.com" }));

        // FIX: Displaying all messages clearly
        onValue(ref(db, 'support'), snap => {
            const list = document.getElementById('list'); 
            list.innerHTML = "";
            let hasData = false;
            
            snap.forEach(c => {
                hasData = true;
                const d = c.val();
                
                // Show Admin's reply if it exists, else show input box
                let replyHTML = d.reply ? 
                    `<div style="background:#d1fae5; color:#065f46; padding:8px; border-radius:6px; margin-top:8px; font-size:13px;"><b>Admin Reply:</b> ${d.reply}</div>` : 
                    `<div class="reply-box">
                        <input type="text" id="rep-${c.key}" placeholder="Type reply here...">
                        <button onclick="sendRep('${c.key}')">Send</button>
                    </div>`;
                
                list.innerHTML += `
                    <div class="card">
                        <div style="font-size:12px; color:#6366f1; font-weight:800; margin-bottom:5px;">👤 +91 ${d.userMobile}</div>
                        <div style="font-weight:800; font-size:15px; color:#1e293b;">${d.message}</div>
                        ${replyHTML}
                    </div>`;
            });
            if(!hasData) list.innerHTML = "<p style='color:#64748b; font-size:13px;'>No messages yet.</p>";
        });

        window.sendRep = id => {
            const txt = document.getElementById('rep-' + id).value;
            if(!txt) return alert("Type a message first!");
            update(ref(db, 'support/' + id), { reply: txt }).then(() => alert("✅ Reply Sent to User!"));
        };
    </script>
</body>
</html>
