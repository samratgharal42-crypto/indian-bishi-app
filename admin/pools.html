<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Pools | Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; padding: 20px; }
        .box { background: white; padding: 20px; border-radius: 16px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        input, select, button { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #cbd5e1; box-sizing: border-box; }
        button { background: #6366f1; color: white; font-weight: 800; border: none; cursor: pointer; }
        .pool-card { background: white; padding: 15px; border-radius: 12px; border-left: 5px solid #6366f1; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn-del { background: #ef4444; width: auto; padding: 8px 15px; font-size: 12px; }
    </style>
</head>
<body>
    <a href="index.html" style="text-decoration:none; font-weight:800; color:#1e293b;">⬅ Back</a>
    <h2>📊 Live & New Pools</h2>

    <div class="box">
        <input type="text" id="p-name" placeholder="Pool Name">
        <input type="number" id="p-win" placeholder="Win Amount (₹)">
        <input type="number" id="p-emi" placeholder="EMI Amount (₹)">
        <input type="number" id="p-total" placeholder="Total Members Needed">
        <button onclick="createPool()">Publish Pool 🚀</button>
    </div>

    <h3>Active Pools</h3>
    <div id="live-pools-list">Loading...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        const db = getDatabase(initializeApp({ databaseURL: "https://indianbishi-pro-default-rtdb.firebaseio.com" }));

        window.createPool = () => {
            const name = document.getElementById('p-name').value;
            const win = document.getElementById('p-win').value;
            const emi = document.getElementById('p-emi').value;
            const total = document.getElementById('p-total').value;
            if(!name || !win) return alert("Fill details!");
            push(ref(db, 'pools'), { name, winAmount: win, emiAmount: emi, totalMembers: total, joined: 0, status: "Open" });
            alert("Pool Live!");
        };

        onValue(ref(db, 'pools'), snap => {
            const list = document.getElementById('live-pools-list');
            list.innerHTML = "";
            snap.forEach(c => {
                const p = c.val();
                list.innerHTML += `
                    <div class="pool-card">
                        <div>
                            <b>${p.name}</b><br>
                            <small>Joined: ${p.joined || 0} / ${p.totalMembers || 0}</small>
                        </div>
                        <button class="btn-del" onclick="deletePool('${c.key}')">Delete</button>
                    </div>`;
            });
        });

        window.deletePool = id => { if(confirm("Delete this pool?")) remove(ref(db, 'pools/' + id)); };
    </script>
</body>
</html>
