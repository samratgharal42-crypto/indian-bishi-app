<h2 style="margin-top:20px;">📊 Live Pools Status</h2>
<div id="live-pools-list">Loading pools...</div>

<script type="module">
    // ... (Firebase Initialization वही ठेवा) ...
    import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    const db = getDatabase();

    onValue(ref(db, 'pools'), snap => {
        const list = document.getElementById('live-pools-list');
        list.innerHTML = "";
        snap.forEach(c => {
            const p = c.val();
            list.innerHTML += `
                <div class="box" style="border-left: 5px solid #6366f1;">
                    <div style="display:flex; justify-content:space-between;">
                        <b>${p.name}</b>
                        <span style="color:red; cursor:pointer;" onclick="deletePool('${c.key}')">🗑️ Delete</span>
                    </div>
                    <p style="font-size:12px; color:#64748b; margin:5px 0;">
                        Win: ₹${p.winAmount} | Join: <b>${p.joined || 0} Users</b>
                    </p>
                    <div style="background:#f1f5f9; height:8px; border-radius:10px;">
                        <div style="background:#6366f1; width:${(p.joined/10)*100}%; height:100%; border-radius:10px;"></div>
                    </div>
                </div>`;
        });
    });

    window.deletePool = (id) => {
        if(confirm("ही बीशी डिलीट करायची का?")) {
            remove(ref(db, 'pools/' + id)).then(() => alert("Pool Deleted!"));
        }
    };
</script>
