<!DOCTYPE html>
<html lang="en">
<head>
    <title>Pools | Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; padding: 15px; }
        .box { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #cbd5e1; }
        input, select, button { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #cbd5e1; font-family: inherit; font-weight: 600;}
        button { background: #6366f1; color: white; font-weight: 800; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <a href="index.html" style="text-decoration:none; font-weight:800; color:#1e293b;">⬅ Back to Menu</a>
    <h2 style="margin-top:10px;">➕ Create Pool</h2>
    
    <div class="box">
        <input type="text" id="p-name" placeholder="Pool Name (e.g. Diwali Dhamaka)">
        <input type="number" id="p-win" placeholder="Win Amount (₹)">
        <select id="p-type"><option value="Daily">Daily EMI</option><option value="Monthly">Monthly EMI</option></select>
        <input type="number" id="p-emi" placeholder="Installment (₹)">
        <input type="number" id="p-duration" placeholder="Duration (e.g. 10)">
        <button onclick="createPool()">Publish Pool 🚀</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        const db = getDatabase(initializeApp({ databaseURL: "https://indianbishi-pro-default-rtdb.firebaseio.com" }));

        window.createPool = () => {
            const name = document.getElementById('p-name').value;
            const win = parseInt(document.getElementById('p-win').value);
            const type = document.getElementById('p-type').value;
            const emi = parseInt(document.getElementById('p-emi').value);
            const duration = parseInt(document.getElementById('p-duration').value);

            if(!name || !win || !emi || !duration) return alert("Fill all fields!");
            push(ref(db, 'pools'), { name, winAmount: win, emiType: type, emiAmount: emi, duration: duration, joined: 0, status: "Open" })
            .then(() => alert("✅ Pool Created & Live!"));
        };
    </script>
</body>
</html>
