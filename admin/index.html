<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Indian Bishi</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; margin: 0; padding: 20px; color: #1e293b; }
        .header { background: #0f172a; color: white; padding: 25px; border-radius: 16px; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .header h1 { margin: 0; font-size: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .menu-card { background: white; padding: 20px; border-radius: 16px; text-align: center; text-decoration: none; color: #1e293b; font-weight: 800; border: 1px solid #e2e8f0; box-shadow: 0 5px 15px rgba(0,0,0,0.02); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
        .menu-card:hover { border-color: #6366f1; transform: translateY(-3px); transition: 0.2s; }
        .icon { font-size: 30px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>⚙️ Master Control Panel</h1>
        <p style="font-size:12px; color:#cbd5e1; margin-top:5px;">Indian Bishi Admin</p>
    </div>

    <div class="grid">
        <a href="deposits.html" class="menu-card"><span class="icon">📥</span> Pending Deposits</a>
        <a href="support.html" class="menu-card"><span class="icon">🎧</span> User Support Chat</a>
        
        <a href="#" class="menu-card" style="opacity: 0.5;"><span class="icon">➕</span> Manage Pools</a>
        <a href="#" class="menu-card" style="opacity: 0.5;"><span class="icon">🏆</span> Withdrawals</a>
        <a href="#" class="menu-card" style="opacity: 0.5;"><span class="icon">👁️</span> Live Bids</a>
        <a href="#" class="menu-card" style="opacity: 0.5;"><span class="icon">👥</span> All Users</a>
    </div>
</body>
</html>
