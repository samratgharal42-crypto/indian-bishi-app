<!DOCTYPE html>
<html lang="en">
<head>
    <title>Withdrawals | Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; padding: 15px; margin: 0; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-back { background: white; padding: 10px 15px; border-radius: 10px; text-decoration: none; color: #1e293b; font-weight: 800; border: 1px solid #e2e8f0; }
        
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #cbd5e1; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .btn-done { background: #10b981; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: 800; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 10px rgba(16,185,129,0.2); }
        .btn-done:active { transform: scale(0.98); }
        .history-card { background: #f8fafc; padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #e2e8f0; border-left: 4px solid #6366f1; }
        
        .bank-info { background: #f1f5f9; padding: 10px; border-radius: 8px; margin: 10px 0; font-size: 12px; border: 1px dashed #cbd5e1; }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="btn-back">⬅ Back</a>
        <h2 style="margin:0; font-size:18px;">🏆 Payouts</h2>
    </div>

    <h3 style="color:#ef4444; font-size: 16px;">⏳ Pending Payouts</h3>
    <div id="w-list"><p style="font-size:12px; color:#64748b;">Loading requests...</p></div>

    <h3 style="color:#10b981; margin-top:30px; font-size: 16px;">✅ Completed Payouts</h3>
    <div id="h-list"><p style="font-size:12px; color:#64748b;">Loading history...</p></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, get, child, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        const db = getDatabase(initializeApp({ databaseURL: "https://indianbishi-pro-default-rtdb.firebaseio.com" }));

        onValue(ref(db, 'withdrawals'), snap => {
            const list = document.getElementById('w-list');
            const hList = document.getElementById('h-list');
            list.innerHTML = ""; hList.innerHTML = "";
            let hasPending = false; let hasHistory = false;

            snap.forEach(c => {
                const w = c.val();
                const mob = w.userMobile || w.winnerMobile; // support both formats
                const reqId = c.key;
                
                if(w.status === "Pending" || w.status === "Pending Payout") {
                    hasPending = true;
                    // Create placeholder div for this specific request
                    const divId = `req-${reqId}`;
                    list.innerHTML += `<div class="card" id="${divId}">Loading details...</div>`;
                    
                    // Fetch Bank Details asynchronously
                    get(child(ref(db), `users/${mob}/bankDetails`)).then(bSnap => {
                        let bankHTML = "<span style='color:#ef4444; font-weight:800;'>No Bank Details Added by User</span>";
                        if(bSnap.exists()){
                            let b = bSnap.val();
                            // Handle potential missing fields gracefully
                            const ac = b.acNumber || b.accountNumber || b.account || 'N/A';
                            const ifsc = b.ifsc || 'N/A';
                            bankHTML = `<span style="color:#0f172a; font-weight:800;">A/C: ${ac} | IFSC: ${ifsc}</span>`;
                        }
                        
                        // Inject the final HTML into the placeholder
                        document.getElementById(divId).innerHTML = `
                            <b style="font-size:16px;">Winner: +91 ${mob}</b><br>
                            <span style="color:#10b981; font-size:24px; font-weight:800; display:block; margin:5px 0;">₹${w.amount}</span>
                            <small style="color:#64748b; font-weight:600;">Pool: ${w.poolName} | Date: ${w.date}</small>
                            
                            <div class="bank-info">
                                <div style="color:#64748b; font-weight:800; margin-bottom:3px; text-transform:uppercase;">🏦 User Bank Details:</div>
                                ${bankHTML}
                            </div>
                            
                            <button class="btn-done" onclick="markPaid('${reqId}', '${mob}', ${w.amount})">Mark as Paid & Deduct Wallet ✅</button>
                        `;
                    });

                } else if (w.status === "Paid") {
                    hasHistory = true;
                    hList.innerHTML += `
                        <div class="history-card">
                            <b>+91 ${mob}</b> <span style="float:right; color:#10b981; font-weight:800;">₹${w.amount}</span><br>
                            <small style="color:#64748b; font-weight:600;">${w.poolName} | Paid on: ${w.date}</small>
                        </div>`;
                }
            });

            setTimeout(() => {
                if(!hasPending) list.innerHTML = "<p style='font-size:13px; color:#64748b;'>No pending payouts.</p>";
                if(!hasHistory) hList.innerHTML = "<p style='font-size:13px; color:#64748b;'>No history found.</p>";
            }, 500); // slight delay for async fetches to complete visually
        });

        window.markPaid = (id, mob, amt) => {
            if(confirm(`Send ₹${amt} to user's bank?\n\nThis will DEDUCT ₹${amt} from their in-app Wallet Balance.`)) {
                
                // 1. Deduct from wallet
                get(child(ref(db), `users/${mob}/balance`)).then(snap => {
                    let curBal = snap.exists() ? parseFloat(snap.val()) : 0;
                    let newBal = curBal - parseFloat(amt);
                    if(newBal < 0) newBal = 0; // Prevent negative balance
                    
                    update(ref(db, `users/${mob}`), { balance: newBal });
                    
                    // 2. Mark as Paid in Withdrawals
                    update(ref(db, 'withdrawals/' + id), { status: "Paid" });
                    
                    // 3. Add to User's Transactions (Passbook)
                    push(ref(db, 'transactions'), { 
                        userMobile: mob, amount: amt, type: 'Debit', status: 'Success', 
                        title: 'Withdrawal Payout (Sent to Bank)', date: new Date().toLocaleDateString('en-IN') 
                    });
                    
                    alert("✅ Payout Successful! Wallet balance deducted.");
                });
            }
        };
    </script>
</body>
</html>
