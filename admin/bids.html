<!DOCTYPE html>
<html lang="en">
<head>
    <title>Live Bids | Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; padding: 15px; margin: 0; }
        .pool-section { background: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #cbd5e1; }
        .bid-item { padding: 8px; border-bottom: 1px dashed #e2e8f0; font-size: 13px; display: flex; justify-content: space-between; }
        .btn-winner { background: linear-gradient(135deg, #10b981, #059669); color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: 800; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <a href="index.html" style="text-decoration:none; font-weight:800; color:#1e293b;">⬅ Back</a>
    <h2 style="margin-top:10px;">👁️ Live Bids Monitor</h2>

    <div id="bids-container"><p style="color:#64748b; font-size:12px;">No active bids going on.</p></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, push, remove, get, child, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        const db = getDatabase(initializeApp({ databaseURL: "https://indianbishi-pro-default-rtdb.firebaseio.com" }));

        onValue(ref(db, 'bids'), snap => {
            const container = document.getElementById('bids-container');
            container.innerHTML = "";
            let hasBids = false;

            snap.forEach(poolSnap => {
                hasBids = true;
                const poolId = poolSnap.key;
                let lowestBid = 9999999;
                let winnerMobile = "";
                let bidsHTML = "";

                poolSnap.forEach(bidSnap => {
                    const b = bidSnap.val();
                    const bAmt = parseInt(b.amount);
                    if(bAmt < lowestBid) { lowestBid = bAmt; winnerMobile = b.user; }
                    bidsHTML += `<div class="bid-item"><span>+91 ${b.user}</span> <b style="color:#ef4444;">₹${bAmt}</b></div>`;
                });

                get(child(ref(db), `pools/${poolId}`)).then(pSnap => {
                    if(!pSnap.exists()) return;
                    const pData = pSnap.val();
                    const poolName = pData.name;
                    const dur = parseInt(pData.duration);
                    const pastWinCount = pData.past_winners ? Object.keys(pData.past_winners).length : 0;

                    container.innerHTML += `
                        <div class="pool-section">
                            <h3 style="margin:0 0 5px; color:#6366f1;">${poolName}</h3>
                            <div style="font-size:11px; color:#64748b; margin-bottom:10px; font-weight:800;">CYCLE: ${pastWinCount}/${dur} Winners Declared</div>
                            
                            <div style="max-height:150px; overflow-y:auto; margin-bottom:10px; border:1px solid #f1f5f9; padding:5px;">
                                ${bidsHTML}
                            </div>
                            
                            <div style="background:#d1fae5; padding:8px; border-radius:6px; font-size:12px; margin-bottom:10px; color:#065f46;">
                                Current Lowest: <b>₹${lowestBid}</b> by +91 ${winnerMobile}
                            </div>
                            
                            <button class="btn-winner" onclick="declareWinner('${poolId}', '${winnerMobile}', ${lowestBid}, '${poolName}')">
                                🏆 Declare Winner & Payout
                            </button>
                        </div>
                    `;
                });
            });
            if(!hasBids) container.innerHTML = "<p style='color:#64748b; font-size:12px;'>No active bids running.</p>";
        });

        // 🚨 ADVANCED WINNER LOGIC WITH DISPLAY INFO 🚨
        window.declareWinner = (pId, wMobile, wAmt, pName) => {
            if(!confirm(`Declare +91 ${wMobile} as winner for ₹${wAmt}?`)) return;
            const todayStr = new Date().toLocaleDateString('en-IN');

            // 1. ADD TO WALLET & WITHDRAWAL
            get(child(ref(db), `users/${wMobile}/balance`)).then(snap => {
                let curBal = snap.exists() ? parseFloat(snap.val()) : 0;
                update(ref(db, `users/${wMobile}`), { balance: curBal + parseFloat(wAmt) });
            });
            push(ref(db, 'withdrawals'), { poolId: pId, poolName: pName, userMobile: wMobile, amount: wAmt, status: "Pending", type: "Auto Winner Payout", date: todayStr });
            push(ref(db, 'transactions'), { userMobile: wMobile, amount: wAmt, type: 'Credit', status: 'Success', title: `🏆 Won: ${pName}`, date: todayStr });

            // 2. ADD TO PAST WINNERS & SAVE LATEST WINNER INFO FOR USERS
            update(ref(db, `pools/${pId}/past_winners`), { [wMobile]: true });
            
            const latestWinnerData = { mobile: wMobile, amount: wAmt, date: todayStr };
            
            update(ref(db, `pools/${pId}/latest_winner`), latestWinnerData).then(() => {
                
                // 3. CHECK IF TENURE ENDED
                get(child(ref(db), `pools/${pId}`)).then(pSnap => {
                    const pData = pSnap.val();
                    const winCount = pData.past_winners ? Object.keys(pData.past_winners).length : 1;
                    
                    if(winCount >= parseInt(pData.duration)) {
                        // RESTART POOL AND CARRY FORWARD LAST WINNER INFO
                        push(ref(db, 'pools'), {
                            name: pData.name + " (New Cycle)", winAmount: pData.winAmount, emiType: pData.emiType, emiAmount: pData.emiAmount, duration: pData.duration, maxMembers: pData.maxMembers, minCibil: pData.minCibil, joined: 0, status: "Open",
                            latest_winner: latestWinnerData // New pool madhe pan junya winner cha record disel
                        });
                        remove(ref(db, `pools/${pId}`)); // Delete old
                        alert("🎉 Winner Declared! Tenure completed, New Pool Auto-Created.");
                    } else {
                        alert("🎉 Winner Declared & Wallet Updated!");
                    }
                });
            });

            // 4. CLEAR BIDS
            remove(ref(db, `bids/${pId}`));
        };
    </script>
</body>
</html>
