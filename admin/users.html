<!DOCTYPE html>
<html lang="en">
<head>
    <title>All Users | Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; padding: 15px; }
        .user-row { background: white; padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; border: 1px solid #e2e8f0; }
    </style>
</head>
<body>
    <a href="index.html" style="text-decoration:none; font-weight:800;">⬅ Back</a>
    <h2>👥 Registered Users</h2>
    <div id="u-list">Loading...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        const db = getDatabase(initializeApp({ databaseURL: "https://indianbishi-pro-default-rtdb.firebaseio.com" }));

        onValue(ref(db, 'users'), snap => {
            const list = document.getElementById('u-list');
            list.innerHTML = "";
            snap.forEach(c => {
                const u = c.val();
                list.innerHTML += `
                    <div class="user-row">
                        <span><b>${u.name || 'No Name'}</b><br><small>+91 ${c.key}</small></span>
                        <span style="color:#10b981; font-weight:800;">₹${u.balance || 0}</span>
                    </div>`;
            });
        });
    </script>
</body>
</html>
