<!DOCTYPE html>
<html lang="en">
<head>
    <title>All Users Info | Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; padding: 15px; margin: 0; }
        .user-card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #cbd5e1; }
        .info-row { font-size: 13px; margin-bottom: 5px; color: #475569; }
        .info-row span { font-weight: 800; color: #1e293b; }
        .wallet-tag { background: #d1fae5; color: #065f46; padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: 800; float: right; }
        .details-btn { background: #f1f5f9; color: #6366f1; border: 1px solid #cbd5e1; padding: 8px; width: 100%; border-radius: 8px; font-weight: 800; margin-top: 10px; cursor: pointer; }
        .hidden-details { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px dashed #cbd5e1; font-size: 12px; }
    </style>
</head>
<body>
    <a href="index.html" style="text-decoration:none; font-weight:800; color:#1e293b;">⬅ Back</a>
    <h2 style="margin-top:10px;">👥 All Registered Users</h2>
    <div id="u-list">Loading...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        const db = getDatabase(initializeApp({ databaseURL: "https://indianbishi-pro-default-rtdb.firebaseio.com" }));

        onValue(ref(db, 'users'), snap => {
            const list = document.getElementById('u-list'); list.innerHTML = "";
            snap.forEach(c => {
                const u = c.val();
                let joinedPoolsHTML = u.joined_pools ? Object.keys(u.joined_pools).length + " Pools Joined" : "None";
                
                list.innerHTML += `
                    <div class="user-card">
                        <div class="wallet-tag">Wallet: ₹${u.balance || 0}</div>
                        <div class="info-row">Name: <span>${u.name || 'N/A'}</span></div>
                        <div class="info-row">Mobile: <span>+91 ${c.key}</span></div>
                        
                        <button class="details-btn" onclick="toggleDetails('${c.key}')">View Full Info 🔽</button>
                        
                        <div class="hidden-details" id="details-${c.key}">
                            <div class="info-row">Password: <span>${u.password || 'N/A'}</span></div>
                            <div class="info-row">KYC Status: <span>${u.kycStatus || 'Pending'}</span></div>
                            <div class="info-row">Active Bishi: <span style="color:#6366f1;">${joinedPoolsHTML}</span></div>
                        </div>
                    </div>`;
            });
        });

        window.toggleDetails = (id) => {
            const el = document.getElementById('details-' + id);
            el.style.display = el.style.display === 'block' ? 'none' : 'block';
        };
    </script>
</body>
</html>
