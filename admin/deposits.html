<!DOCTYPE html>
<html lang="en">
<head>
    <title>Deposits | Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; padding: 15px; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #cbd5e1; }
        .btn { padding: 10px; border: none; border-radius: 8px; font-weight: 800; color: white; cursor: pointer; width: 48%; }
    </style>
</head>
<body>
    <a href="index.html" style="text-decoration:none; font-weight:800; color:#1e293b;">⬅ Back</a>
    <h2>📥 UTR Verifications</h2>
    <div id="list">Loading...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, get, child, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        const db = getDatabase(initializeApp({ databaseURL: "https://indianbishi-pro-default-rtdb.firebaseio.com" }));

        onValue(ref(db, 'deposits'), snap => {
            const list = document.getElementById('list'); list.innerHTML = "";
            let hasData = false;
            snap.forEach(c => {
                const d = c.val();
                if(d.status === "Pending") {
                    hasData = true;
                    list.innerHTML += `
                        <div class="card">
                            <b style="font-size:18px;">₹${d.amount}</b> | +91 ${d.userMobile}<br>
                            <span style="color:#64748b;">UTR: ${d.utr}</span><br>
                            <span style="color:#6366f1; font-weight:800;">Reason: ${d.poolName || 'Wallet'}</span><br><br>
                            <button class="btn" style="background:#10b981;" onclick="appr('${c.key}', '${d.userMobile}', ${d.amount}, '${d.poolId}', '${d.poolName}')">Accept ✅</button>
                            <button class="btn" style="background:#ef4444;" onclick="rej('${c.key}')">Reject ❌</button>
                        </div>`;
                }
            });
            if(!hasData) list.innerHTML = "No pending deposits.";
        });

        window.appr = (id, mob, amt, pId, pName) => {
            const dateStr = new Date().toLocaleDateString('en-IN');
            
            // 1. Add to Wallet
            get(child(ref(db), `users/${mob}/balance`)).then(snap => {
                let cur = snap.exists() ? parseFloat(snap.val()) : 0;
                update(ref(db, `users/${mob}`), { balance: cur + parseFloat(amt) });
            });

            // 2. Add to Joined Pools (FIXED LOGIC)
            if(pId && pId !== "undefined" && pId !== "null" && pId !== "Wallet Deposit") {
                update(ref(db, `users/${mob}/joined_pools`), { [pId]: true });
                push(ref(db, 'transactions'), { userMobile: mob, amount: amt, type: 'Credit', status: 'Success', title: `Joined Pool: ${pName}`, date: dateStr });
                alert("✅ Wallet Updated & Bishi Activated in User's App!");
            } else {
                push(ref(db, 'transactions'), { userMobile: mob, amount: amt, type: 'Credit', status: 'Success', title: `Wallet Recharge`, date: dateStr });
                alert("✅ Wallet Updated!");
            }
            
            update(ref(db, 'deposits/' + id), { status: "Approved" });
        };

        window.rej = id => update(ref(db, 'deposits/' + id), { status: "Rejected" });
    </script>
</body>
</html>
